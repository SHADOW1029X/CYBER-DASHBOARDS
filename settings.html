<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAPTURES // SETTINGS</title>
  <meta name="description" content="Capture Node Telemetry Dashboard — account settings.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' https://unpkg.com; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src https://snowy-fog-b0d1.23amtics322.workers.dev; frame-ancestors 'none'; base-uri 'none'; form-action 'none';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="no-referrer">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23020810'/%3E%3Cpolygon points='16,2 30,9 30,23 16,30 2,23 2,9' fill='none' stroke='%2300e5ff' stroke-width='1.5'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-family='monospace' font-size='13' font-weight='bold' fill='%2300e5ff'%3E%E2%97%88%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <style>
    /* ── DELTHA DISPLAY FONT ──────────────────────────────────────── */
    @font-face {
      font-family: 'Deltha';
      src: url('./Deltha.otf') format('opentype'),
           url('./Deltha.ttf') format('truetype');
      font-weight: normal; font-style: normal; font-display: swap;
    }

    :root {
      --bg:         #020810;
      --bg2:        #040d18;
      --panel:      #07111e;
      --panel2:     #0a1828;
      --border:     #0d3a52;
      --border-hi:  #1a6a8a;
      --cyan:       #00e5ff;
      --cyan-dim:   #007a99;
      --cyan-deep:  #003d4d;
      --green:      #00ff9d;
      --green-dim:  #006644;
      --amber:      #ffb300;
      --amber-dim:  #7a5500;
      --red:        #ff3b5c;
      --red-dim:    #7a1a2a;
      --violet:     #bf7fff;
      --violet-dim: #5a3a88;
      --text:       #b0d4e8;
      --text-dim:   #3d6478;
      --text-mid:   #6a9ab8;
      --glow-c:  0 0 8px #00e5ff77, 0 0 24px #00e5ff33;
      --glow-g:  0 0 8px #00ff9d77, 0 0 24px #00ff9d33;
      --glow-r:  0 0 8px #ff3b5c77, 0 0 24px #ff3b5c33;
      --glow-v:  0 0 8px #bf7fff77, 0 0 24px #bf7fff33;
      --glow-a:  0 0 8px #ffb30077, 0 0 24px #ffb30033;
      --font-deltha: 'Deltha', monospace;
    }

    .logo-top, .panel-title, .btn, .tab-btn, .stat-value,
    .query-box-title, .modal-title, th, .sql-result-table th, .page-btn {
      font-family: var(--font-deltha) !important;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scrollbar-width: thin; scrollbar-color: var(--cyan-dim) var(--bg2); overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Rajdhani', sans-serif; min-height: 100vh;
    }

    body::before {
      content: ''; position: fixed; inset: 0; z-index: 9998; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,229,255,.007) 3px, rgba(0,229,255,.007) 4px);
    }
    #webgl-canvas {
      position: fixed; inset: 0; z-index: 0;
      width: 100%; height: 100%;
      pointer-events: none; opacity: 1;
    }
    .bg-layer { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .bg-layer::before {
      content: ''; position: absolute; inset: 0;
      background:
        linear-gradient(90deg, rgba(2,8,16,.65) 0%, rgba(2,8,16,.35) 34%, rgba(2,8,16,.04) 67%, rgba(2,8,16,.35) 100%),
        radial-gradient(circle at 52% 54%, transparent 0%, rgba(0,0,0,.18) 70%, rgba(0,0,0,.30) 100%);
    }
    .bg-layer::after {
      content: ''; position: absolute; inset: 0; opacity: .12;
      background-image:
        linear-gradient(rgba(0,229,255,.9) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.9) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at 63% 48%, black 0%, transparent 74%);
    }
    .noise {
      position: fixed; inset: -50%; z-index: 2; pointer-events: none;
      opacity: .035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 260 260' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: grain 9s steps(6) infinite;
      mix-blend-mode: overlay;
    }
    @keyframes grain {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(-4%, 3%); }
      40% { transform: translate(3%, -5%); }
      60% { transform: translate(-3%, -2%); }
      80% { transform: translate(4%, 4%); }
    }
    #bg-grid {
      position: fixed; bottom: 0; left: 50%; z-index: 0; pointer-events: none;
      transform: translateX(-50%) rotateX(70deg); transform-origin: center bottom;
      width: 260vw; height: 160vh;
      background-image: linear-gradient(rgba(0,229,255,.06) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,229,255,.06) 1px, transparent 1px);
      background-size: 56px 56px; opacity: .55;
    }
    #bg-vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse 100% 100% at 50% 100%, transparent 30%, rgba(2,8,16,.42) 70%, rgba(2,8,16,.7) 100%);
    }
    #bg-glow {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 70vw; height: 2px; z-index: 1; pointer-events: none;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      filter: blur(1px); opacity: .7;
      box-shadow: 0 0 110px 40px rgba(0,229,255,.2);
    }

    /* ── LAYOUT ───────────────────────────────────────────────────── */
    :root { --layout-px: 24px; }
    .layout { position: relative; z-index: 2; max-width: 1760px; margin: 0 auto; padding: 0 var(--layout-px) 80px; }

    /* ── NAVBAR ───────────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px var(--layout-px) 18px;
      gap: 16px; flex-wrap: nowrap;
      position: sticky; top: 0; z-index: 5000;
      background: rgba(2,8,16,.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      margin: 0 calc(var(--layout-px) * -1) 0;
    }
    /* pseudo border — avoids border-image + backdrop-filter Safari conflict */
    header::before {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-hi) 20%, var(--cyan-dim) 50%, var(--border-hi) 80%, transparent);
      pointer-events: none;
    }
    header::after {
      content: ''; position: absolute; bottom: -1px; left: -5%; right: -5%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: headerScan 4s ease-in-out infinite; opacity: .4;
    }
    @keyframes headerScan { 0%,100%{transform:scaleX(0);opacity:0} 50%{transform:scaleX(1);opacity:.5} }
    @media (max-width: 860px) {
      :root { --layout-px: 14px; }
      header { flex-wrap: wrap; } .header-right { gap: 7px; flex-wrap: wrap; }
    }

    .logo-block { display: flex; flex-direction: column; gap: 3px; }
    .logo-top {
      font-family: var(--font-deltha); font-weight: 900;
      font-size: clamp(1.3rem, 3vw, 1.75rem);
      color: var(--cyan); text-shadow: var(--glow-c);
      letter-spacing: .18em; line-height: 1;
      display: flex; align-items: center; gap: 12px;
    }
    .logo-favicon {
      display: inline-block; width: 32px; height: 32px;
      object-fit: contain; flex-shrink: 0;
      filter: drop-shadow(0 0 6px rgba(0,229,255,.6));
      image-rendering: crisp-edges;
    }
    .logo-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(.58rem, 1.2vw, .68rem);
      color: var(--text-dim); letter-spacing: .3em;
      display: flex; align-items: center; gap: 8px;
    }
    .logo-sub::before {
      content: ''; display: inline-block; width: 18px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan-dim));
    }
    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    /* ── BUTTONS ──────────────────────────────────────────────────── */
    .btn {
      position: relative; background: transparent;
      border: 1px solid var(--border); border-radius: 2px;
      padding: 7px 14px; font-family: var(--font-deltha);
      font-size: .57rem; font-weight: 700; letter-spacing: .14em;
      cursor: pointer; transition: all .2s ease; white-space: nowrap;
      clip-path: polygon(0 0, calc(100% - 7px) 0, 100% 7px, 100% 100%, 7px 100%, 0 calc(100% - 7px));
      overflow: hidden; display: inline-flex; align-items: center;
      justify-content: center; gap: 6px; text-decoration: none; color: var(--cyan);
      user-select: none; -webkit-user-select: none;
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
      transform: translateX(-100%); transition: transform .3s ease;
    }
    .btn:hover::before { transform: translateX(100%); }
    .btn:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
    .btn:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }
    .hdr-btn { padding: 6px 13px; font-size: .55rem; letter-spacing: .12em; }
    @media (max-width: 860px) { .hdr-btn { padding: 7px 10px; font-size: .55rem; } }

    .btn-cyan   { color: var(--cyan);   border-color: var(--cyan-dim); }
    .btn-cyan:hover:not(:disabled)   { background: rgba(0,229,255,.08);   box-shadow: var(--glow-c); border-color: var(--cyan); }
    .btn-amber  { color: var(--amber);  border-color: var(--amber-dim); }
    .btn-amber:hover:not(:disabled)  { background: rgba(255,179,0,.08);   box-shadow: var(--glow-a); border-color: var(--amber); }
    .btn-red    { color: var(--red);    border-color: var(--red-dim); }
    .btn-red:hover:not(:disabled)    { background: rgba(255,59,92,.08);   box-shadow: var(--glow-r); border-color: var(--red); }
    .btn-violet { color: var(--violet); border-color: var(--violet-dim); }
    .btn-violet:hover:not(:disabled) { background: rgba(191,127,255,.08); box-shadow: var(--glow-v); border-color: var(--violet); }
    .btn-green  { color: var(--green);  border-color: var(--green-dim); }
    .btn-green:hover:not(:disabled)  { background: rgba(0,255,157,.08);   box-shadow: var(--glow-g); border-color: var(--green); }

    /* ── PANEL ────────────────────────────────────────────────── */
    .settings-wrap { max-width: 600px; margin: 48px auto 0; position: relative; z-index: 2; }
    .panel {
      background: linear-gradient(135deg, var(--panel2) 0%, #040d18 100%);
      border: 1px solid var(--border-hi); border-radius: 3px;
      box-shadow: 0 30px 80px rgba(0,0,0,.9), var(--glow-c), inset 0 1px 0 rgba(0,229,255,.1);
      clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
      overflow: hidden;
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 22px; border-bottom: 1px solid var(--border);
      background: rgba(4,13,24,.7); position: relative;
    }
    .panel-header::after {
      content: ''; position: absolute; bottom: 0; left: 5%; right: 5%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
    }
    .panel-title {
      font-family: var(--font-deltha); font-size: .8rem; font-weight: 700;
      letter-spacing: .16em; color: var(--amber); text-shadow: var(--glow-a);
    }
    .panel-body { padding: 22px; }
    .panel-footer {
      padding: 14px 22px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
      flex-wrap: wrap; background: rgba(4,13,24,.5);
    }

    /* ── FORMS ─────────────────────────────────────────────────── */
    .form-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-label {
      font-family: 'Share Tech Mono', monospace; font-size: .6rem;
      color: var(--cyan-dim); letter-spacing: .16em; text-transform: uppercase;
    }
    .field-input {
      background: rgba(2,8,16,.8); border: 1px solid var(--border);
      border-radius: 2px; padding: 8px 11px; color: var(--text);
      font-family: 'Share Tech Mono', monospace; font-size: .76rem;
      outline: none; transition: border-color .2s, box-shadow .2s; width: 100%;
      caret-color: var(--cyan);
    }
    .field-input:focus { border-color: var(--cyan-dim); box-shadow: 0 0 0 2px rgba(0,229,255,.08); }
    .field-input::placeholder { color: var(--text-dim); }

    /* password field wrapper (for show/hide toggle) */
    .pw-wrap { position: relative; }
    .pw-wrap .field-input { padding-right: 38px; }
    .pw-toggle {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-dim);
      font-size: .75rem; padding: 2px 4px; transition: color .15s; line-height: 1;
    }
    .pw-toggle:hover { color: var(--cyan); }

    .cred-section-title {
      font-family: var(--font-deltha); font-size: .58rem;
      color: var(--amber); letter-spacing: .22em;
      margin: 4px 0 12px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .cred-hint {
      font-family: 'Share Tech Mono', monospace; font-size: .62rem;
      color: var(--text-dim); margin-top: 12px; line-height: 1.65;
      border-left: 2px solid var(--border); padding-left: 10px;
    }

    /* password strength bar */
    .pw-strength { margin-top: 6px; }
    .pw-strength-bar {
      height: 3px; border-radius: 2px; background: var(--border);
      overflow: hidden; margin-bottom: 4px;
    }
    .pw-strength-fill { height: 100%; width: 0; border-radius: 2px; transition: width .3s, background .3s; }
    .pw-strength-lbl { font-family: 'Share Tech Mono', monospace; font-size: .55rem; color: var(--text-dim); }

    #credMsg {
      display: none; border-radius: 2px;
      font-family: 'Share Tech Mono', monospace; font-size: .7rem;
      padding: 8px 12px; margin-top: 12px; line-height: 1.5;
    }
    #credMsg.ok  { background: rgba(0,255,157,.06); border: 1px solid var(--green-dim); border-left: 3px solid var(--green); color: var(--green); }
    #credMsg.err { background: rgba(255,59,92,.06);  border: 1px solid var(--red-dim);  border-left: 3px solid var(--red);   color: var(--red); }

    /* ── TOASTS ────────────────────────────────────────────── */
    .toast-stack { position: fixed; bottom: 22px; right: 22px; z-index: 9500; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast {
      background: var(--panel2); border-radius: 2px;
      padding: 10px 18px; font-family: 'Share Tech Mono', monospace; font-size: .7rem;
      box-shadow: 0 6px 30px rgba(0,0,0,.8); animation: toastIn .25s ease forwards;
      pointer-events: none;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
      display: flex; align-items: center; gap: 8px;
    }
    .toast.out { animation: toastOut .25s ease forwards; }
    @keyframes toastIn  { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:none} }
    @keyframes toastOut { to{opacity:0;transform:translateX(24px)} }
    .t-green  { border: 1px solid var(--green);  border-left: 3px solid var(--green);  color: var(--green); }
    .t-red    { border: 1px solid var(--red);    border-left: 3px solid var(--red);    color: var(--red); }
    .t-cyan   { border: 1px solid var(--cyan);   border-left: 3px solid var(--cyan);   color: var(--cyan); }
    .t-amber  { border: 1px solid var(--amber);  border-left: 3px solid var(--amber);  color: var(--amber); }
    .t-violet { border: 1px solid var(--violet); border-left: 3px solid var(--violet); color: var(--violet); }

    @media (max-width: 700px) { .logo-top { font-size: 1.1rem; } .settings-wrap { margin-top: 24px; } }
  </style>
</head>
<body>

<div id="bg-grid"     aria-hidden="true"></div>
<div id="bg-vignette" aria-hidden="true"></div>
<div id="bg-glow"     aria-hidden="true"></div>

<div class="layout">

  <!-- ══════════════ NAVBAR ══════════════ -->
  <header role="banner">
    <div class="logo-block">
      <div class="logo-top">
        <img src="favicon.png" alt="" class="logo-favicon" aria-hidden="true" onerror="this.style.display='none'">
        CAPTURES
      </div>
      <div class="logo-sub" aria-hidden="true">ACCOUNT SETTINGS</div>
    </div>
    <div class="header-right">
      <a href="dashboard.html"      class="btn btn-cyan   hdr-btn" title="Open Dashboard">⊞ DASHBOARD</a>
      <a href="NYTHERIX-ADMIN.html" class="btn btn-violet hdr-btn" title="Open NYTHERIX Admin">◈ NYTHERIX ADMIN</a>
      <a href="settings.html"       class="btn btn-amber  hdr-btn" title="Account settings" aria-current="page">⚙ SETTINGS</a>
      <button class="btn btn-red hdr-btn" id="logoutBtn" aria-label="Disconnect and log out">⏻ DISCONNECT</button>
    </div>
  </header>

  <!-- ══════════════ SETTINGS PANEL ══════════════ -->
  <main>
  <div class="settings-wrap">
    <div class="panel" role="region" aria-labelledby="settingsTitle">
      <div class="panel-header">
        <span class="panel-title" id="settingsTitle">⚙ CHANGE CREDENTIALS</span>
      </div>
      <div class="panel-body">
        <div class="form-grid">
          <div class="cred-section-title">// VERIFY IDENTITY</div>

          <div class="field-group">
            <label class="field-label" for="credCurrentPass">CURRENT PASSWORD <span style="color:var(--red)" aria-label="required">*</span></label>
            <div class="pw-wrap">
              <input class="field-input" id="credCurrentPass" type="password"
                     autocomplete="current-password" maxlength="128"
                     placeholder="Required to save any change"
                     aria-required="true" aria-describedby="credMsg">
              <button class="pw-toggle" type="button" data-target="credCurrentPass" aria-label="Show/hide current password" tabindex="0">👁</button>
            </div>
          </div>

          <div class="cred-section-title" style="margin-top:16px;">// NEW VALUES</div>

          <div class="field-group">
            <label class="field-label" for="credNewUser">NEW USERNAME</label>
            <input class="field-input" id="credNewUser" type="text"
                   autocomplete="username" spellcheck="false" maxlength="64"
                   placeholder="Leave blank to keep current">
          </div>

          <div class="field-group">
            <label class="field-label" for="credNewPass">NEW PASSWORD</label>
            <div class="pw-wrap">
              <input class="field-input" id="credNewPass" type="password"
                     autocomplete="new-password" maxlength="128"
                     placeholder="Leave blank to keep current"
                     aria-describedby="pwStrengthLbl">
              <button class="pw-toggle" type="button" data-target="credNewPass" aria-label="Show/hide new password" tabindex="0">👁</button>
            </div>
            <div class="pw-strength" id="pwStrengthBlock" style="display:none">
              <div class="pw-strength-bar"><div class="pw-strength-fill" id="pwStrengthFill"></div></div>
              <div class="pw-strength-lbl" id="pwStrengthLbl" aria-live="polite"></div>
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" for="credNewPassConfirm">CONFIRM NEW PASSWORD</label>
            <div class="pw-wrap">
              <input class="field-input" id="credNewPassConfirm" type="password"
                     autocomplete="new-password" maxlength="128"
                     placeholder="Repeat new password">
              <button class="pw-toggle" type="button" data-target="credNewPassConfirm" aria-label="Show/hide confirm password" tabindex="0">👁</button>
            </div>
          </div>

          <div id="credMsg" role="alert" aria-live="assertive"></div>
          <p class="cred-hint">// Other active sessions will be signed out automatically when credentials change.</p>
        </div>
      </div>
      <div class="panel-footer">
        <button class="btn btn-amber" id="credSaveBtn">◈ APPLY CHANGES</button>
        <a class="btn btn-cyan" href="dashboard.html">CANCEL</a>
      </div>
    </div>
  </div>
  </main>

</div>

<div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="false"></div>

<script>
'use strict';

const BASE_URL = 'https://snowy-fog-b0d1.23amtics322.workers.dev';

let _isLoggingOut = false;

// ── TOAST ────────────────────────────────────────────────────────
function toast(msg, type = 't-cyan', dur = 2800) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastStack').appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, dur);
}

// ── ALERT ────────────────────────────────────────────────────────
function showMsg(text, type) {
  const el = document.getElementById('credMsg');
  el.textContent = text;
  el.className = type;
  el.style.display = text ? 'block' : 'none';
}
function clearMsg() { showMsg('', ''); }

// ── PASSWORD SHOW / HIDE ─────────────────────────────────────────
document.querySelectorAll('.pw-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const input = document.getElementById(btn.dataset.target);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.textContent = isHidden ? '🙈' : '👁';
    btn.setAttribute('aria-label', (isHidden ? 'Hide' : 'Show') + '/' + 'hide ' + btn.getAttribute('aria-label').split(' ').slice(-2).join(' '));
  });
});

// ── PASSWORD STRENGTH ────────────────────────────────────────────
function scorePassword(pw) {
  if (!pw) return { score: 0, label: '', color: '' };
  let s = 0;
  if (pw.length >= 8)  s++;
  if (pw.length >= 12) s++;
  if (/[A-Z]/.test(pw)) s++;
  if (/[0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  const levels = [
    { label: 'Very Weak', color: '#ff3b5c' },
    { label: 'Weak',      color: '#ff3b5c' },
    { label: 'Fair',      color: '#ffb300' },
    { label: 'Strong',    color: '#00e5ff' },
    { label: 'Very Strong', color: '#00ff9d' },
    { label: 'Excellent',   color: '#00ff9d' },
  ];
  return { score: s, ...levels[Math.min(s, levels.length - 1)] };
}

document.getElementById('credNewPass').addEventListener('input', function () {
  const block = document.getElementById('pwStrengthBlock');
  const fill  = document.getElementById('pwStrengthFill');
  const lbl   = document.getElementById('pwStrengthLbl');
  if (!this.value) { block.style.display = 'none'; return; }
  block.style.display = 'block';
  const { score, label, color } = scorePassword(this.value);
  fill.style.width      = `${Math.round((score / 5) * 100)}%`;
  fill.style.background = color;
  lbl.textContent       = label;
  lbl.style.color       = color;
});

// ── AUTH CHECK ───────────────────────────────────────────────────
(async () => {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), 6000);
  try {
    const res = await fetch(`${BASE_URL}/auth/me`, { credentials: 'include', signal: ctrl.signal });
    clearTimeout(tid);
    if (res.ok) {
      const data = await res.json().catch(() => ({}));
      if (data.authenticated === true) return;
    }
  } catch (_) { clearTimeout(tid); }
  window.location.replace('index.html');
})();

// ── VISIBILITY RE-CHECK ──────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible' || _isLoggingOut) return;
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), 6000);
  fetch(`${BASE_URL}/auth/me`, { credentials: 'include', signal: ctrl.signal })
    .then(r => { clearTimeout(tid); return (r.status === 401 || r.status === 403) ? null : r.ok ? r.json() : null; })
    .then(d => { if (d === null || d?.authenticated !== true) window.location.replace('index.html'); })
    .catch(() => clearTimeout(tid));
});

// ── LOGOUT ───────────────────────────────────────────────────────
document.getElementById('logoutBtn').addEventListener('click', async () => {
  _isLoggingOut = true;
  try { await fetch(`${BASE_URL}/auth/logout`, { method: 'POST', credentials: 'include' }); } catch (_) {}
  toast('Session terminated', 't-amber');
  setTimeout(() => window.location.replace('index.html'), 600);
});

// ── SAVE CREDENTIALS ─────────────────────────────────────────────
async function saveCredentials() {
  const currentPass    = document.getElementById('credCurrentPass').value;
  const newUser        = document.getElementById('credNewUser').value.trim();
  const newPass        = document.getElementById('credNewPass').value;
  const newPassConfirm = document.getElementById('credNewPassConfirm').value;
  const btn            = document.getElementById('credSaveBtn');

  clearMsg();

  // client-side validation
  if (!currentPass)             { showMsg('⚠ Current password is required.', 'err'); document.getElementById('credCurrentPass').focus(); return; }
  if (!newUser && !newPass)     { showMsg('⚠ Enter a new username, new password, or both.', 'err'); return; }
  if (newPass && newPass.length < 8)   { showMsg('⚠ New password must be at least 8 characters.', 'err'); return; }
  if (newPass && newPass.length > 128) { showMsg('⚠ New password too long (max 128 chars).', 'err'); return; }
  if (newUser && newUser.length > 64)  { showMsg('⚠ Username too long (max 64 chars).', 'err'); return; }
  if (newPass && newPass !== newPassConfirm) { showMsg('⚠ New passwords do not match.', 'err'); document.getElementById('credNewPassConfirm').focus(); return; }

  btn.disabled = true;
  btn.textContent = 'APPLYING…';

  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), 10_000);
  try {
    const payload = { current_password: currentPass };
    if (newUser) payload.new_username = newUser;
    if (newPass) payload.new_password = newPass;

    const res  = await fetch(`${BASE_URL}/auth/change-credentials`, {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: ctrl.signal
    });
    clearTimeout(tid);
    const data = await res.json().catch(() => ({}));

    if (res.ok && data.success) {
      showMsg('✓ Credentials updated. Other devices will need to log in again.', 'ok');
      // only clear password fields on success; preserve username field
      document.getElementById('credCurrentPass').value  = '';
      document.getElementById('credNewPass').value      = '';
      document.getElementById('credNewPassConfirm').value = '';
      document.getElementById('pwStrengthBlock').style.display = 'none';
      toast('✓ Credentials updated', 't-green');
    } else {
      // only clear current password on auth failure, preserve other fields
      document.getElementById('credCurrentPass').value = '';
      showMsg(`⚠ ${data.error || `Update failed (${res.status})`}`, 'err');
      document.getElementById('credCurrentPass').focus();
    }
  } catch (e) {
    clearTimeout(tid);
    // network error — don't clear any fields so user can retry
    const msg = e.name === 'AbortError' ? 'Request timed out.' : `Network error — ${e.message}`;
    showMsg(`⚠ ${msg}`, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '◈ APPLY CHANGES';
  }
}

document.getElementById('credSaveBtn').addEventListener('click', saveCredentials);

// Enter key in any field submits
document.querySelectorAll('.field-input').forEach(inp => {
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveCredentials(); });
});
</script>
