<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAPTURES // SETTINGS</title>
  <meta name="description" content="Capture Node Telemetry Dashboard — account settings.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' https://unpkg.com; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src https://snowy-fog-b0d1.23amtics322.workers.dev https://unpkg.com; frame-ancestors 'none'; base-uri 'none'; form-action 'none';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="no-referrer">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23020810'/%3E%3Cpolygon points='16,2 30,9 30,23 16,30 2,23 2,9' fill='none' stroke='%2300e5ff' stroke-width='1.5'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-family='monospace' font-size='13' font-weight='bold' fill='%2300e5ff'%3E%E2%97%88%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <style>
    /* ── DELTHA DISPLAY FONT ──────────────────────────────────────── */
    @font-face {
      font-family: 'Deltha';
      src: url('./Deltha.otf') format('opentype'),
           url('./Deltha.ttf') format('truetype');
      font-weight: normal; font-style: normal; font-display: swap;
    }

    :root {
      --bg:         #020810;
      --bg2:        #040d18;
      --border:     #0d3a52;
      --border-hi:  #1a6a8a;
      --cyan:       #00e5ff;
      --cyan-dim:   #007a99;
      --green:      #00ff9d;
      --green-dim:  #006644;
      --amber:      #ffb300;
      --amber-dim:  #7a5500;
      --red:        #ff3b5c;
      --red-dim:    #7a1a2a;
      --violet:     #bf7fff;
      --violet-dim: #5a3a88;
      --text:       #b0d4e8;
      --text-dim:   #3d6478;
      --glow-c:  0 0 8px #00e5ff77, 0 0 24px #00e5ff33;
      --glow-r:  0 0 8px #ff3b5c77, 0 0 24px #ff3b5c33;
      --glow-v:  0 0 8px #bf7fff77, 0 0 24px #bf7fff33;
      --glow-a:  0 0 8px #ffb30077, 0 0 24px #ffb30033;
      --font-deltha: 'Deltha', monospace;
    }

    .logo-top, .panel-title, .btn {
      font-family: var(--font-deltha) !important;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scrollbar-width: thin; scrollbar-color: var(--cyan-dim) var(--bg2); overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Rajdhani', sans-serif; min-height: 100vh;
      min-height: 100dvh;
    }

    body::before {
      content: ''; position: fixed; inset: 0; z-index: 9998; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,229,255,.007) 3px, rgba(0,229,255,.007) 4px);
    }
    #webgl-canvas {
      position: fixed; inset: 0; z-index: 0;
      width: 100%; height: 100%;
      pointer-events: none; opacity: 0.94;
    }
    .bg-layer { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .bg-layer::before {
      content: ''; position: absolute; inset: 0;
      background:
        linear-gradient(90deg, rgba(2,8,16,.65) 0%, rgba(2,8,16,.35) 34%, rgba(2,8,16,.04) 67%, rgba(2,8,16,.35) 100%),
        radial-gradient(circle at 52% 54%, transparent 0%, rgba(0,0,0,.18) 70%, rgba(0,0,0,.30) 100%);
    }
    .noise {
      position: fixed; inset: -50%; z-index: 2; pointer-events: none;
      opacity: .035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 260 260' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: grain 9s steps(6) infinite;
      mix-blend-mode: overlay;
    }
    @keyframes grain {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(-4%, 3%); }
      40% { transform: translate(3%, -5%); }
      60% { transform: translate(-3%, -2%); }
      80% { transform: translate(4%, 4%); }
    }

    /* ── LAYOUT ───────────────────────────────────────────────────── */
    :root { --layout-px: 24px; }
    .layout { position: relative; z-index: 2; margin: 0 auto; padding: 0 var(--layout-px) 80px; }

    /* ── NAVBAR ───────────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px var(--layout-px) 18px;
      gap: 16px; flex-wrap: nowrap;
      position: sticky; top: 0; z-index: 5000;
      background: rgba(2,8,16,.62);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      margin: 0 calc(var(--layout-px) * -1) 0;
    }
    /* pseudo border — avoids border-image + backdrop-filter Safari conflict */
    header::before {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-hi) 20%, var(--cyan-dim) 50%, var(--border-hi) 80%, transparent);
      pointer-events: none;
    }
    header::after {
      content: ''; position: absolute; bottom: -1px; left: -5%; right: -5%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: headerScan 4s ease-in-out infinite; opacity: .4;
    }
    @keyframes headerScan { 0%,100%{transform:scaleX(0);opacity:0} 50%{transform:scaleX(1);opacity:.5} }
    @media (max-width: 860px) {
      :root      { --layout-px: 14px; }
      header     { flex-wrap: wrap; }
      .hdr-right { gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
      .hdr-btn   { padding: 7px 10px; font-size: .55rem; }
    }

    .logo-block { display: flex; flex-direction: column; gap: 3px; }
    .logo-top {
      font-family: var(--font-deltha); font-weight: 900;
      font-size: clamp(1.3rem, 3vw, 1.75rem);
      color: var(--cyan); text-shadow: var(--glow-c);
      letter-spacing: .18em; line-height: 1;
      display: flex; align-items: center; gap: 12px;
    }
    .logo-favicon {
      display: inline-block; width: 32px; height: 32px;
      object-fit: contain; flex-shrink: 0;
      filter: drop-shadow(0 0 6px rgba(0,229,255,.6));
      image-rendering: crisp-edges;
    }
    .logo-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(.58rem, 1.2vw, .68rem);
      color: var(--text-dim); letter-spacing: .3em;
      display: flex; align-items: center; gap: 8px;
    }
    .logo-sub::before {
      content: ''; display: inline-block; width: 18px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan-dim));
    }
    .hdr-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    /* ── BUTTONS ──────────────────────────────────────────────────── */
    .btn {
      position: relative; background: transparent;
      border: 1px solid var(--border); border-radius: 2px;
      padding: 7px 14px; font-family: var(--font-deltha);
      font-size: .57rem; font-weight: 700; letter-spacing: .14em;
      cursor: pointer; transition: all .2s ease; white-space: nowrap;
      clip-path: polygon(0 0, calc(100% - 7px) 0, 100% 7px, 100% 100%, 7px 100%, 0 calc(100% - 7px));
      overflow: hidden; display: inline-flex; align-items: center;
      justify-content: center; gap: 6px; text-decoration: none; color: var(--cyan);
      user-select: none; -webkit-user-select: none;
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
      transform: translateX(-100%); transition: transform .3s ease;
    }
    .btn:hover::before { transform: translateX(100%); }
    .btn:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
    .btn:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }
    .hdr-btn { padding: 6px 13px; font-size: .55rem; letter-spacing: .12em; }

    .btn-cyan   { color: var(--cyan);   border-color: var(--cyan-dim); }
    .btn-cyan:hover:not(:disabled)   { background: rgba(0,229,255,.08);   box-shadow: var(--glow-c); border-color: var(--cyan); }
    .btn-amber  { color: var(--amber);  border-color: var(--amber-dim); }
    .btn-amber:hover:not(:disabled)  { background: rgba(255,179,0,.08);   box-shadow: var(--glow-a); border-color: var(--amber); }
    .btn-red    { color: var(--red);    border-color: var(--red-dim); }
    .btn-red:hover:not(:disabled)    { background: rgba(255,59,92,.08);   box-shadow: var(--glow-r); border-color: var(--red); }
    .btn-violet { color: var(--violet); border-color: var(--violet-dim); }
    .btn-violet:hover:not(:disabled) { background: rgba(191,127,255,.08); box-shadow: var(--glow-v); border-color: var(--violet); }

    /* ── PANEL ────────────────────────────────────────────────── */
    .panel-wrap { filter: drop-shadow(0 0 12px rgba(0,229,255,.15)) drop-shadow(0 8px 32px rgba(0,0,0,.7)); }
    .settings-wrap { max-width: 600px; margin: 48px auto 0; position: relative; z-index: 2; }
    .panel {
      background: linear-gradient(135deg, rgba(10,24,40,.5) 0%, rgba(4,13,24,.45) 100%);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border-hi); border-radius: 3px;
      clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
      overflow: hidden;
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 22px; border-bottom: 1px solid var(--border);
      background: rgba(4,13,24,.4); position: relative;
    }
    .panel-header::after {
      content: ''; position: absolute; bottom: 0; left: 5%; right: 5%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
    }
    .panel-title {
      font-family: var(--font-deltha); font-size: .8rem; font-weight: 700;
      letter-spacing: .16em; color: var(--amber); text-shadow: var(--glow-a);
    }
    .panel-body { padding: 22px; }
    .panel-footer {
      padding: 14px 22px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
      flex-wrap: wrap; background: rgba(4,13,24,.3);
    }

    /* ── FORMS ─────────────────────────────────────────────────── */
    .cred-fieldset  { border: none; padding: 0; margin: 0; }
    .required-star  { color: var(--red); }
    .form-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-label {
      font-family: 'Share Tech Mono', monospace; font-size: .6rem;
      color: var(--cyan-dim); letter-spacing: .16em; text-transform: uppercase;
    }
    .field-input {
      background: rgba(2,8,16,.55); border: 1px solid var(--border);
      border-radius: 2px; padding: 8px 11px; color: var(--text);
      font-family: 'Share Tech Mono', monospace; font-size: .76rem;
      outline: none; transition: border-color .2s, box-shadow .2s; width: 100%;
      caret-color: var(--cyan);
    }
    .field-input:focus { border-color: var(--cyan-dim); box-shadow: 0 0 0 2px rgba(0,229,255,.08); }
    .field-input::placeholder { color: var(--text-dim); }

    /* password field wrapper (for show/hide toggle) */
    .pw-wrap { position: relative; }
    .pw-wrap .field-input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 0; top: 0; bottom: 0; width: 42px;
      background: transparent; border: none; border-left: 1px solid var(--border);
      color: var(--text-dim); cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: color .2s, background .2s, border-color .2s;
      border-radius: 0 2px 2px 0;
    }
    .pw-toggle:hover { color: var(--cyan); background: rgba(0,229,255,.06); border-color: var(--cyan-dim); }
    .pw-toggle:focus-visible { outline: 2px solid var(--cyan); outline-offset: -2px; }

    .pw-icon-wrap {
      position: relative; width: 18px; height: 18px;
      transform-style: preserve-3d; transition: transform .5s cubic-bezier(.34,1.56,.64,1);
    }
    .pw-icon-wrap.revealed { transform: rotateY(180deg); }
    .pw-icon-front, .pw-icon-back {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center; backface-visibility: hidden;
    }
    .pw-icon-back { transform: rotateY(180deg); }
    .pw-icon-front svg, .pw-icon-back svg {
      width: 16px; height: 16px; stroke: currentColor; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }
    .field-input.pw-visible { border-color: var(--cyan-dim); box-shadow: inset 0 0 20px rgba(0,229,255,.06); }

    .cred-section-title {
      font-family: var(--font-deltha); font-size: .58rem;
      color: var(--amber); letter-spacing: .22em;
      margin: 4px 0 12px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .cred-section-title--gap { margin-top: 16px; }
    .cred-hint {
      font-family: 'Share Tech Mono', monospace; font-size: .62rem;
      color: var(--text-dim); margin-top: 12px; line-height: 1.65;
      border-left: 2px solid var(--border); padding-left: 10px;
    }

    /* password strength bar */
    .pw-strength { margin-top: 6px; }
    #pwStrengthBlock { display: none; }
    .pw-strength-bar {
      height: 3px; border-radius: 2px; background: var(--border);
      overflow: hidden; margin-bottom: 4px;
    }
    .pw-strength-fill { height: 100%; width: 0; border-radius: 2px; transition: width .3s, background .3s; }
    .pw-strength-lbl { font-family: 'Share Tech Mono', monospace; font-size: .55rem; color: var(--text-dim); }

    #credMsg {
      display: none; border-radius: 2px;
      font-family: 'Share Tech Mono', monospace; font-size: .7rem;
      padding: 8px 12px; margin-top: 12px; line-height: 1.5;
    }
    #credMsg.ok  { background: rgba(0,255,157,.06); border: 1px solid var(--green-dim); border-left: 3px solid var(--green); color: var(--green); }
    #credMsg.err { background: rgba(255,59,92,.06);  border: 1px solid var(--red-dim);  border-left: 3px solid var(--red);   color: var(--red); }

    /* ── TOASTS ────────────────────────────────────────────── */
    .toast-stack { position: fixed; bottom: 22px; right: 22px; z-index: 9500; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast {
      background: rgba(10,24,40,.65); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 2px;
      padding: 10px 18px; font-family: 'Share Tech Mono', monospace; font-size: .7rem;
      box-shadow: 0 6px 30px rgba(0,0,0,.8); animation: toastIn .25s ease forwards;
      pointer-events: none;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
      display: flex; align-items: center; gap: 8px;
    }
    .toast.out { animation: toastOut .25s ease forwards; }
    @keyframes toastIn  { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:none} }
    @keyframes toastOut { to{opacity:0;transform:translateX(24px)} }
    .t-green  { border: 1px solid var(--green);  border-left: 3px solid var(--green);  color: var(--green); }
    .t-cyan   { border: 1px solid var(--cyan);   border-left: 3px solid var(--cyan);   color: var(--cyan); }
    .t-amber  { border: 1px solid var(--amber);  border-left: 3px solid var(--amber);  color: var(--amber); }

    /* ── AUTH GATE ──────────────────────────────────────────── */
    #gate {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      transition: opacity .3s ease;
    }
    #gate.done   { opacity: 0; pointer-events: none; }
    #gate.hidden { display: none; }
    .gate-inner  { text-align: center; }
    .gate-logo   {
      font-family: var(--font-deltha); font-weight: 900;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--cyan); text-shadow: var(--glow-c);
      letter-spacing: .2em; margin-bottom: 10px;
    }
    .gate-txt  { font-family: 'Share Tech Mono', monospace; font-size: .68rem; color: var(--text-dim); letter-spacing: .14em; margin-bottom: 20px; }
    .gate-err  { font-family: 'Share Tech Mono', monospace; font-size: .68rem; color: var(--red); letter-spacing: .1em; margin-bottom: 14px; display: none; }
    .gate-spin { width: 26px; height: 26px; margin: 0 auto; border: 2px solid rgba(0,229,255,.15); border-top-color: var(--cyan); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════ RESPONSIVE ══════════════════════ */

    /* ── Large phone (≤700px): hide non-critical header chrome ── */
    @media (max-width: 700px) {
      .logo-sub   { display: none; }
      .logo-top   { font-size: 1.1rem; }
      .hdr-btn    { font-size: .52rem; padding: 6px 10px; letter-spacing: .08em; }
      .panel-body { padding: 18px 16px; }
      .settings-wrap { margin-top: 24px; }
    }

    /* ── Small phone (≤540px): icons-only nav, tighten layout ── */
    @media (max-width: 540px) {
      .hdr-btn .btn-label { display: none; }
      .hdr-btn      { padding: 9px 11px; min-width: 40px; justify-content: center; }
      .logo-favicon { width: 26px; height: 26px; }
      .logo-top     { font-size: 1rem; letter-spacing: .1em; gap: 8px; }
      .panel-body   { padding: 16px 14px; }
      .panel-header { padding: 12px 14px; }
      .panel-footer { padding: 12px 14px; }
    }

    /* ── Narrow phone (≤400px): minimal chrome ── */
    @media (max-width: 400px) {
      :root  { --layout-px: 12px; }
      .layout { padding-bottom: 60px; }
    }

    /* ── Touch devices: 44×44 minimum tap targets ── */
    @media (hover: none) and (pointer: coarse) {
      .hdr-btn { min-height: 44px; }
      .btn     { min-height: 44px; }
    }

    /* ── iOS input zoom prevention (font-size must be ≥16px) ── */
    @media (max-width: 768px) {
      .field-input { font-size: 1rem; }
    }

    /* ── Reduced motion: kill animations and WebGL ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
      #webgl-canvas { display: none; }
      .bg-layer     { background: rgba(2,8,16,.96); }
    }

    /* ── Toast positioning on narrow screens ── */
    @media (max-width: 480px) {
      .toast-stack { right: 10px; left: 10px; bottom: 16px; }
      .toast       { width: 100%; }
    }

    /* ── Reduced motion: kill animations and WebGL ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
      #webgl-canvas { display: none; }
      .bg-layer     { background: rgba(2,8,16,.96); }
    }
  </style>
</head>
<body>

<!-- WebGL interactive background -->
<canvas id="webgl-canvas" aria-hidden="true"></canvas>
<div class="bg-layer" aria-hidden="true"></div>
<div class="noise" aria-hidden="true"></div>

<!-- Auth gate — covers entire page until session verified -->
<div id="gate" role="status" aria-live="polite">
  <div class="gate-inner">
    <div class="gate-logo">CAPTURES</div>
    <div class="gate-txt" id="gateTxt">VERIFYING SESSION…</div>
    <div class="gate-err" id="gateErr"></div>
    <div class="gate-spin" id="gateSpin"></div>
  </div>
</div>

<div class="layout" id="mainLayout" inert>

  <!-- ══════════════ NAVBAR ══════════════ -->
  <header role="banner">
    <div class="logo-block">
      <div class="logo-top">
        <img src="favicon.png" alt="" class="logo-favicon" aria-hidden="true" onerror="this.style.display='none'">
        CAPTURES
      </div>
      <div class="logo-sub" aria-hidden="true">ACCOUNT SETTINGS</div>
    </div>
    <div class="hdr-right">
      <a href="dashboard.html"      class="btn btn-cyan   hdr-btn" title="Open Dashboard"><span aria-hidden="true">⊞</span> <span class="btn-label">DASHBOARD</span></a>
      <a href="NYTHERIX-ADMIN.html" class="btn btn-violet hdr-btn" title="Open NYTHERIX Admin"><span aria-hidden="true">◈</span> <span class="btn-label">NYTHERIX ADMIN</span></a>
      <a href="About.html"          class="btn btn-violet hdr-btn" title="About"><span aria-hidden="true">◉</span> <span class="btn-label">ABOUT</span></a>
      <button class="btn btn-red hdr-btn" id="logoutBtn" aria-label="Disconnect and log out"><span aria-hidden="true">⏻</span> <span class="btn-label">DISCONNECT</span></button>
    </div>
  </header>

  <!-- ══════════════ SETTINGS PANEL ══════════════ -->
  <main>
  <div class="settings-wrap">

<script>
'use strict';

const BASE_URL = 'https://snowy-fog-b0d1.23amtics322.workers.dev';

let _isLoggingOut = false;

// ── TOAST ────────────────────────────────────────────────────────
function toast(msg, type = 't-cyan', dur = 2800) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastStack').appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, dur);
}

// ── ALERT ────────────────────────────────────────────────────────
function showMsg(text, type) {
  const el = document.getElementById('credMsg');
  el.textContent = text;
  el.className = type;
  el.style.display = text ? 'block' : 'none';
}
function clearMsg() { showMsg('', ''); }

// ── PASSWORD SHOW / HIDE ─────────────────────────────────────────
function resetPwToggle(inputId) {
  const input = document.getElementById(inputId);
  const btn = document.querySelector(`.pw-toggle[data-target="${inputId}"]`);
  if (!input || !btn || input.type === 'password') return; // untouched — nothing to reset
  input.type = 'password';
  input.classList.remove('pw-visible');
  btn.querySelector('.pw-icon-wrap').classList.remove('revealed');
  const fieldName = btn.getAttribute('aria-label').replace(/^Hide /i, '');
  btn.setAttribute('aria-label', 'Show ' + fieldName);
}

document.querySelectorAll('.pw-toggle').forEach(btn => {
  const input = document.getElementById(btn.dataset.target);
  const iconWrap = btn.querySelector('.pw-icon-wrap');
  const fieldName = btn.getAttribute('aria-label').replace(/^Show\/hide /i, '');

  btn.addEventListener('click', () => {
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    input.classList.toggle('pw-visible', isHidden);
    iconWrap.classList.toggle('revealed', isHidden);
    btn.setAttribute('aria-label', (isHidden ? 'Hide' : 'Show') + ' ' + fieldName);
  });
});

// ── PASSWORD STRENGTH ────────────────────────────────────────────
function scorePassword(pw) {
  if (!pw) return { score: 0, label: '', color: '' };
  let s = 0;
  if (pw.length >= 8)  s++;
  if (pw.length >= 12) s++;
  if (/[A-Z]/.test(pw)) s++;
  if (/[0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  const levels = [
    { label: 'Very Weak', color: '#ff3b5c' },
    { label: 'Weak',      color: '#ff3b5c' },
    { label: 'Fair',      color: '#ffb300' },
    { label: 'Strong',    color: '#00e5ff' },
    { label: 'Very Strong', color: '#00ff9d' },
    { label: 'Excellent',   color: '#00ff9d' },
  ];
  return { score: s, ...levels[Math.min(s, levels.length - 1)] };
}

document.getElementById('credNewPass').addEventListener('input', function () {
  const block = document.getElementById('pwStrengthBlock');
  const fill  = document.getElementById('pwStrengthFill');
  const lbl   = document.getElementById('pwStrengthLbl');
  if (!this.value) { block.style.display = 'none'; return; }
  block.style.display = 'block';
  const { score, label, color } = scorePassword(this.value);
  fill.style.width      = `${Math.round((score / 5) * 100)}%`;
  fill.style.background = color;
  lbl.textContent       = label;
  lbl.style.color       = color;
});

// ── AUTH GATE ────────────────────────────────────────────────────
(async () => {
  const gate     = document.getElementById('gate');
  const gateTxt  = document.getElementById('gateTxt');
  const gateErr  = document.getElementById('gateErr');
  const gateSpin = document.getElementById('gateSpin');

  // Trap focus inside gate while it's visible
  gate.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    const focusable = Array.from(gate.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])'));
    if (!focusable.length) { e.preventDefault(); return; }
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey) { if (document.activeElement === first || !gate.contains(document.activeElement)) { e.preventDefault(); last.focus(); } }
    else { if (document.activeElement === last || !gate.contains(document.activeElement)) { e.preventDefault(); first.focus(); } }
  });

  // Move focus into gate immediately so Tab doesn't escape to layout
  gate.setAttribute('tabindex', '-1');
  gate.focus();

  const tryAuth = async () => {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), 7000);
    try {
      const res = await fetch(`${BASE_URL}/auth/me`, { credentials: 'include', signal: ctrl.signal });
      clearTimeout(tid);
      if (res.ok) {
        const data = await res.json().catch(() => ({}));
        if (data.authenticated === true) return true;
      }
      return false;   // auth failure (401, 403, or invalid payload)
    } catch (_) {
      clearTimeout(tid);
      return null;    // network/timeout error — distinct from auth failure
    }
  };

  const result = await tryAuth();

  if (result === true) {
    // Authenticated — reveal page, enable form, remove inert
    document.getElementById('mainLayout').removeAttribute('inert');
    document.getElementById('credFieldset').disabled = false;
    document.getElementById('credSaveBtn').disabled  = false;
    gate.classList.add('done');
    setTimeout(() => gate.classList.add('hidden'), 320);
  } else if (result === null) {
    // Network error — keep gate up, show retry (form stays locked)
    gateTxt.textContent      = 'CONNECTION ERROR';
    gateErr.textContent      = 'Could not reach auth server. Check your connection.';
    gateErr.style.display    = 'block';
    gateSpin.style.display   = 'none';
    const retryBtn = document.createElement('button');
    retryBtn.className       = 'btn btn-cyan';
    retryBtn.style.marginTop = '16px';
    retryBtn.textContent     = '↺ Retry';
    retryBtn.addEventListener('click', () => window.location.reload());
    gate.querySelector('.gate-inner').appendChild(retryBtn);
  } else {
    // Auth failure — redirect immediately
    window.location.replace('index.html');
  }
})();

// ── VISIBILITY RE-CHECK ──────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible' || _isLoggingOut) return;
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), 6000);
  fetch(`${BASE_URL}/auth/me`, { credentials: 'include', signal: ctrl.signal })
    .then(r => {
      clearTimeout(tid);
      if (r.status === 401 || r.status === 403) { window.location.replace('index.html'); return null; }
      return r.ok ? r.json() : null;
    })
    .then(d => { if (d !== null && d?.authenticated !== true) window.location.replace('index.html'); })
    .catch(() => clearTimeout(tid));
});

// ── LOGOUT ───────────────────────────────────────────────────────
document.getElementById('logoutBtn').addEventListener('click', async () => {
  _isLoggingOut = true;
  try { await fetch(`${BASE_URL}/auth/logout`, { method: 'POST', credentials: 'include' }); } catch (_) {}
  toast('Session terminated', 't-amber');
  setTimeout(() => window.location.replace('index.html'), 600);
});

// ── SAVE CREDENTIALS ─────────────────────────────────────────────
async function saveCredentials() {
  const btn = document.getElementById('credSaveBtn');
  if (btn.disabled) return; // already in flight or pre-auth — ignore
  if (document.getElementById('credFieldset').disabled) return; // gate not cleared yet

  const currentPass    = document.getElementById('credCurrentPass').value;
  const newUser        = document.getElementById('credNewUser').value.trim();
  const newPass        = document.getElementById('credNewPass').value;
  const newPassConfirm = document.getElementById('credNewPassConfirm').value;

  clearMsg();

  // client-side validation
  if (!currentPass)             { showMsg('⚠ Current password is required.', 'err'); document.getElementById('credCurrentPass').focus(); return; }
  if (!newUser && !newPass)     { showMsg('⚠ Enter a new username, new password, or both.', 'err'); return; }
  if (newPass && newPass.length < 8)   { showMsg('⚠ New password must be at least 8 characters.', 'err'); return; }
  if (newPass && newPass.length > 128) { showMsg('⚠ New password too long (max 128 chars).', 'err'); return; }
  if (newUser && newUser.length > 64)  { showMsg('⚠ Username too long (max 64 chars).', 'err'); return; }
  if (newPass && newPass !== newPassConfirm) { showMsg('⚠ New passwords do not match.', 'err'); document.getElementById('credNewPassConfirm').focus(); return; }

  btn.disabled = true;
  btn.textContent = 'APPLYING…';

  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), 10_000);
  try {
    const payload = { current_password: currentPass };
    if (newUser) payload.new_username = newUser;
    if (newPass) payload.new_password = newPass;

    const res  = await fetch(`${BASE_URL}/auth/change-credentials`, {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: ctrl.signal
    });
    clearTimeout(tid);
    const data = await res.json().catch(() => ({}));

    if (res.ok && data.success) {
      showMsg('✓ Credentials updated. Other devices will need to log in again.', 'ok');
      // only clear password fields on success; preserve username field
      document.getElementById('credCurrentPass').value  = '';
      document.getElementById('credNewPass').value      = '';
      document.getElementById('credNewPassConfirm').value = '';
      document.getElementById('pwStrengthBlock').style.display = 'none';
      resetPwToggle('credCurrentPass');
      resetPwToggle('credNewPass');
      resetPwToggle('credNewPassConfirm');
      toast('✓ Credentials updated', 't-green');
    } else {
      // only clear current password on auth failure, preserve other fields
      document.getElementById('credCurrentPass').value = '';
      resetPwToggle('credCurrentPass');
      showMsg(`⚠ ${data.error || `Update failed (${res.status})`}`, 'err');
      document.getElementById('credCurrentPass').focus();
    }
  } catch (e) {
    clearTimeout(tid);
    // network error — don't clear any fields so user can retry
    const msg = e.name === 'AbortError' ? 'Request timed out.' : `Network error — ${e.message}`;
    showMsg(`⚠ ${msg}`, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '◈ APPLY CHANGES';
  }
}

document.getElementById('credSaveBtn').addEventListener('click', saveCredentials);

// Enter key in any field submits
document.querySelectorAll('.field-input').forEach(inp => {
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveCredentials(); });
});
</script>

<script type="module">
  import * as THREE from "three";
  import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
  import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
  import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
  import { ShaderPass } from "three/addons/postprocessing/ShaderPass.js";
  import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

  let scene;
  let camera;
  let renderer;
  let composer;
  let blurPass;
  let renderTarget;
  let floorMesh;

  const clock = new THREE.Clock();
  let globalTime = 0;
  const trailObjects = [];
  const trailMaterials = [];

  const pointer = new THREE.Vector2(0, 0);
  const easedPointer = new THREE.Vector2(0, 0);

  const config = {
    dpr: Math.min(window.devicePixelRatio || 1, 1.6),
    exposure: 2.6,
    brightness: 3.0,
    bloomStrength: 0.44,
    bloomRadius: 0.32,
    bloomThreshold: 0.02,
    speedMultiplier: 0.105,
    linesCount: window.innerWidth < 768 ? 60 : 110,
    dotDensity: 74,
    dotSize: 0.19,
    dotSpeed: 1.45,
    blurStrength: 1.8,
    arcRadius: 15.5,
    bendStartZ: -126.0,
    floorLength: 148.0,
    wallHeight: 205.0,
    color1: "#ffb300",
    color2: "#00e5ff",
    color3: "#bf7fff",
    color4: "#00ff9d",
    color5: "#b0d4e8"
  };

  class PerformanceCurve extends THREE.Curve {
    constructor(x, zStart, zBend, radius, yEnd) {
      super();
      this.x = x;
      this.zStart = zStart;
      this.zBend = zBend;
      this.radius = radius;
      this.yEnd = yEnd;
      this.L_flat = Math.abs(zStart - (zBend + radius));
      this.L_arc = Math.PI * radius * 0.5;
      this.L_up = Math.max(0.1, yEnd - radius);
      this.totalLength = this.L_flat + this.L_arc + this.L_up;
    }

    getPoint(t, output = new THREE.Vector3()) {
      const d = t * this.totalLength;
      let py = 0;
      let pz = 0;

      if (d <= this.L_flat) {
        pz = this.zStart - d;
      } else if (d <= this.L_flat + this.L_arc) {
        const n = (d - this.L_flat) / this.L_arc;
        const e = n * n * (3 - 2 * n);
        const a = (n * 0.36 + e * 0.64) * Math.PI * 0.5;
        py = this.radius * (1 - Math.cos(a));
        pz = (this.zBend + this.radius) - Math.sin(a) * this.radius;
      } else {
        py = this.radius + (d - (this.L_flat + this.L_arc));
        pz = this.zBend;
      }

      return output.set(this.x, py, pz);
    }
  }

  init();
  if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
    animate();
  }

  function init() {
    const canvas = document.querySelector("#webgl-canvas");

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020810);

    camera = new THREE.PerspectiveCamera(54, window.innerWidth / window.innerHeight, 1, 2000);
    camera.position.set(0, 16, 132);
    camera.lookAt(0, 26, -62);

    renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      powerPreference: "high-performance"
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(config.dpr);
    renderer.toneMapping = THREE.LinearToneMapping;
    renderer.toneMappingExposure = config.exposure;

    renderTarget = new THREE.WebGLRenderTarget(
      window.innerWidth * config.dpr,
      window.innerHeight * config.dpr,
      {
        type: THREE.HalfFloatType,
        format: THREE.RGBAFormat
      }
    );

    const renderScene = new RenderPass(scene, camera);

    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      config.bloomStrength,
      config.bloomRadius,
      config.bloomThreshold
    );

    const blurShader = {
      uniforms: {
        tDiffuse: { value: null },
        resolution: { value: new THREE.Vector2(window.innerWidth * config.dpr, window.innerHeight * config.dpr) },
        blurStrength: { value: config.blurStrength }
      },
      vertexShader: `
        varying vec2 vUv;

        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform vec2 resolution;
        uniform float blurStrength;
        varying vec2 vUv;

        void main() {
          float mask = 1.0 - smoothstep(0.0, 0.58, vUv.y);
          float radius = mask * blurStrength;

          if (radius < 0.1) {
            gl_FragColor = texture2D(tDiffuse, vUv);
          } else {
            vec4 color = vec4(0.0);
            float total = 0.0;
            const float goldenAngle = 2.3999632;

            for (int i = 0; i < 30; i++) {
              float f = float(i);
              float r = sqrt(f) * radius;
              float theta = f * goldenAngle;
              vec2 offset = vec2(cos(theta), sin(theta)) * (r / resolution);
              color += texture2D(tDiffuse, vUv + offset);
              total += 1.0;
            }

            gl_FragColor = color / total;
          }
        }
      `
    };

    blurPass = new ShaderPass(blurShader);
    const outputPass = new OutputPass();

    composer = new EffectComposer(renderer, renderTarget);
    composer.setPixelRatio(config.dpr);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);
    composer.addPass(blurPass);
    composer.addPass(outputPass);

    createFloor();
    generateTrails();
    updateGeometries();

    window.addEventListener("resize", onWindowResize);
    window.addEventListener("pointermove", onPointerMove, { passive: true });
  }

  function createFloor() {
    const material = new THREE.MeshBasicMaterial({
      color: 0x000000,
      transparent: true,
      opacity: 0.965,
      depthWrite: false,
      side: THREE.DoubleSide
    });

    floorMesh = new THREE.Mesh(new THREE.BufferGeometry(), material);
    floorMesh.position.set(0, -0.5, -0.5);
    floorMesh.renderOrder = 1;
    scene.add(floorMesh);
  }

  function generateTrails() {
    const group = new THREE.Group();
    scene.add(group);

    const vertexShader = `
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vViewPosition;

      void main() {
        vUv = uv;
        vNormal = normalMatrix * normal;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        vViewPosition = -mv.xyz;
        gl_Position = projectionMatrix * mv;
      }
    `;

    const fragmentShader = `
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vViewPosition;

      uniform float uTime;
      uniform vec3 uColor;
      uniform float uSpeed;
      uniform float uOffset;
      uniform float uTailLength;
      uniform float uIntensityMultiplier;
      uniform float uBendUv;
      uniform float uIsReflection;
      uniform float uDotDensity;
      uniform float uDotSize;
      uniform float uDotSpeed;
      uniform float uBrightness;

      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
      }

      void main() {
        float t = fract(uTime * uSpeed + uOffset);
        float dist = fract(t - vUv.x + 1.0);

        float baseAlpha = smoothstep(uTailLength, 0.0, dist);
        baseAlpha = pow(max(0.0, baseAlpha), 1.22);

        vec3 viewDir = normalize(vViewPosition);
        float fresnel = abs(dot(normalize(vNormal), viewDir));
        float edgeSoftener = smoothstep(0.0, 0.025, fresnel);
        baseAlpha *= edgeSoftener;

        float core = pow(max(0.0, baseAlpha), 3.2) * 1.35;

        float movingUv = vUv.x - (uTime * uSpeed * uDotSpeed) - uOffset;
        float sp = movingUv * uDotDensity;
        float dotId = floor(sp);
        float dotLocal = fract(sp);

        float dotShape = length(vec2(
          (dotLocal - 0.5) * 2.0,
          (fract(vUv.y + 0.5) - 0.5) * 6.0
        ));

        float dotMask = 1.0 - smoothstep(0.0, max(0.001, uDotSize), dotShape);
        float dotRand = step(0.62, hash(vec2(dotId, uOffset)));
        float dotPulse = sin(uTime * 4.0 + hash(vec2(dotId)) * 6.28) * 0.28 + 0.72;
        float dotFinal = dotMask * dotRand * dotPulse * baseAlpha;

        if (uIsReflection > 0.5) {
          float reflectionFade = 1.0 - smoothstep(uBendUv - 0.015, uBendUv, vUv.x);
          baseAlpha *= reflectionFade;
          core *= reflectionFade;
          dotFinal *= reflectionFade * 0.08;

          baseAlpha = pow(max(0.0, baseAlpha), 0.55) *
            (0.58 + hash(vUv * 210.0 + uTime * 0.05) * 0.42);

          core *= 0.28;
        }

        vec3 trailColor = uColor * (baseAlpha + core * 1.45) * uIntensityMultiplier * uBrightness;
        vec3 rgb = trailColor / max(1.0 - clamp(dotFinal * 1.75, 0.0, 0.94), 0.001)
          + uColor * dotFinal * 2.25 * uIntensityMultiplier * uBrightness;

        gl_FragColor = vec4(rgb, (baseAlpha + dotFinal) * uIntensityMultiplier);
      }
    `;

    for (let i = 0; i < config.linesCount; i++) {
      const normalized = (i / (config.linesCount - 1)) * 2 - 1;
      const eased = Math.sign(normalized) * Math.pow(Math.abs(normalized), 1.28);

      let startX = (normalized * 0.34 + eased * 0.66) * 92;
      startX += (Math.random() - 0.5) * 2.8;

      const thickness = Math.random() * 0.18 + 0.06;

      let colorIndex;
      const colorRoll = Math.random();

      if (colorRoll < 0.36) colorIndex = 2;
      else if (colorRoll < 0.62) colorIndex = 3;
      else if (colorRoll < 0.80) colorIndex = 4;
      else if (colorRoll < 0.93) colorIndex = 1;
      else colorIndex = 5;

      const uniforms = {
        uTime: { value: 0 },
        uColor: { value: new THREE.Color(config[`color${colorIndex}`]) },
        uSpeed: { value: Math.random() * 0.46 + 0.22 },
        uOffset: { value: Math.random() },
        uTailLength: { value: Math.random() * 0.36 + 0.28 },
        uIntensityMultiplier: { value: 1.0 },
        uBendUv: { value: 0.0 },
        uIsReflection: { value: 0.0 },
        uDotDensity: { value: config.dotDensity },
        uDotSize: { value: config.dotSize },
        uDotSpeed: { value: config.dotSpeed },
        uBrightness: { value: config.brightness }
      };

      const material = new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      const mesh = new THREE.Mesh(new THREE.BufferGeometry(), material);

      const reflectionMaterial = material.clone();
      reflectionMaterial.uniforms.uIntensityMultiplier.value = 0.22;
      reflectionMaterial.uniforms.uIsReflection.value = 1.0;

      const reflectionMesh = new THREE.Mesh(new THREE.BufferGeometry(), reflectionMaterial);
      reflectionMesh.scale.y = -1;
      reflectionMesh.position.y = -1.0;

      group.add(mesh, reflectionMesh);

      trailMaterials.push(material.uniforms, reflectionMaterial.uniforms);
      trailObjects.push({ mesh, reflectionMesh, startX, thickness });
    }
  }

  function updateGeometries() {
    if (floorMesh.geometry) floorMesh.geometry.dispose();

    const floorGeometry = new THREE.PlaneGeometry(1000, 1000, 1, 1500);
    floorGeometry.rotateX(-Math.PI * 0.5);

    const positions = floorGeometry.attributes.position.array;

    for (let i = 0; i < positions.length; i += 3) {
      if (positions[i + 2] < config.bendStartZ) {
        const distance = config.bendStartZ - positions[i + 2];
        const maxArc = config.arcRadius * Math.PI * 0.5;

        if (distance < maxArc) {
          const n = distance / maxArc;
          const eased = n * n * (3 - 2 * n);
          const angle = (n * 0.36 + eased * 0.64) * Math.PI * 0.5;

          positions[i + 1] = config.arcRadius * (1 - Math.cos(angle));
          positions[i + 2] = config.bendStartZ - Math.sin(angle) * config.arcRadius;
        } else {
          positions[i + 1] = config.arcRadius + (distance - maxArc);
          positions[i + 2] = config.bendStartZ - config.arcRadius;
        }
      }
    }

    floorGeometry.computeVertexNormals();
    floorMesh.geometry = floorGeometry;

    const bendUv = Math.abs(config.floorLength - config.bendStartZ) /
      (
        Math.abs(config.floorLength - config.bendStartZ) +
        Math.PI * config.arcRadius * 0.5 +
        Math.max(0.1, config.wallHeight - config.arcRadius)
      );

    trailObjects.forEach((object) => {
      const path = new PerformanceCurve(
        object.startX,
        config.floorLength,
        config.bendStartZ - config.arcRadius,
        config.arcRadius,
        config.wallHeight
      );

      const geometry = new THREE.TubeGeometry(path, 210, object.thickness, 8, false);

      if (object.mesh.geometry) object.mesh.geometry.dispose();
      if (object.reflectionMesh.geometry) object.reflectionMesh.geometry.dispose();

      object.mesh.geometry = geometry;
      object.reflectionMesh.geometry = geometry.clone(); // separate instance to avoid shared-dispose corruption

      object.mesh.material.uniforms.uBendUv.value = bendUv;
      object.reflectionMesh.material.uniforms.uBendUv.value = bendUv;
    });
  }

  function onPointerMove(event) {
    pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
    pointer.y = (event.clientY / window.innerHeight) * 2 - 1;
  }

  function onWindowResize() {
    config.dpr = Math.min(window.devicePixelRatio || 1, 1.6);

    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setPixelRatio(config.dpr);
    renderer.setSize(window.innerWidth, window.innerHeight);

    composer.setPixelRatio(config.dpr);
    composer.setSize(window.innerWidth, window.innerHeight);

    renderTarget.setSize(window.innerWidth * config.dpr, window.innerHeight * config.dpr);

    blurPass.uniforms.resolution.value.set(
      window.innerWidth * config.dpr,
      window.innerHeight * config.dpr
    );
  }

  function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    globalTime += delta * config.speedMultiplier;

    trailMaterials.forEach((materialUniforms) => {
      materialUniforms.uTime.value = globalTime;
    });

    easedPointer.lerp(pointer, 0.035);

    camera.position.x = easedPointer.x * 7;
    camera.position.y = 16 - easedPointer.y * 3.5;
    camera.lookAt(easedPointer.x * 4, 26, -62);

    composer.render();
  }
</script>
</body>
</html>
