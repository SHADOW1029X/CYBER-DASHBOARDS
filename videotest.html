<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cinematic Warrior · Scroll & Parallax</title>
  <!-- GSAP + ScrollTrigger from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    /* reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0b0b0e;
      overflow-x: hidden;
      color: #fff;
    }

    /* spacer sections for scroll context */
    .spacer {
      height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.2rem, 4vw, 2.4rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: #0b0b0e;
      color: rgba(255, 255, 255, 0.25);
      font-weight: 300;
      position: relative;
      z-index: 2;
      pointer-events: none;
      user-select: none;
    }
    .spacer span {
      background: rgba(255, 255, 255, 0.03);
      padding: 0.8rem 2.2rem;
      border-radius: 60px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    /* ----- CINEMATIC SECTION (pin + video) ----- */
    #cinematic-section {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #0a0a0c;
      will-change: transform;
      /* GPU acceleration for the whole section */
      transform: translateZ(0);
      backface-visibility: hidden;
      perspective: 1200px;
      z-index: 10;
    }

    /* video wrapper – holds the video + parallax layer */
    .video-parallax-wrapper {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      will-change: transform;
      transform: translateZ(0);
      backface-visibility: hidden;
      /* subtle depth overlay */
    }

    /* video element – covers entire wrapper, object-fit cover */
    #warrior-video {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: translate(-50%, -50%) translateZ(0);
      will-change: transform;
      backface-visibility: hidden;
      /* subtle cinematic grade */
      filter: brightness(0.96) contrast(1.04) saturate(1.1);
      image-rendering: auto;
    }

    /* overlay content – keep readable, layered above video */
    .hero-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      z-index: 20;
      padding: 1.5rem;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.5) 100%);
    }

    .hero-overlay h1 {
      font-size: clamp(2.6rem, 12vw, 6rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-shadow: 0 8px 30px rgba(0,0,0,0.7);
      margin-bottom: 0.4rem;
      background: linear-gradient(135deg, #f0e9e1 0%, #d4c9bc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transform: translateZ(20px);
    }

    .hero-overlay p {
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.75;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
      backdrop-filter: blur(2px);
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      background: rgba(0,0,0,0.2);
    }

    /* small indicator for scroll */
    .scroll-hint {
      position: absolute;
      bottom: 2.4rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.25);
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.06);
      z-index: 25;
      pointer-events: none;
    }

    /* guarantee no edge exposure: video moves within wrapper, wrapper stays fixed */
    /* parallax will be applied to the wrapper via transform */
    /* mobile fallback: mouse events still work, but we limit intensity if needed */
    @media (max-width: 768px) {
      .hero-overlay h1 {
        font-size: clamp(2.2rem, 14vw, 3.6rem);
      }
      .hero-overlay p {
        letter-spacing: 0.2em;
        font-size: 0.9rem;
      }
    }

    /* ensure section pinned & no scroll jank */
    #cinematic-section {
      will-change: transform, opacity;
    }

    /* small extra polish */
    .glow-line {
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,215,150,0.3), transparent);
      margin-top: 1.2rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <!-- top spacer -->
  <section class="spacer"><span>⬇ scroll down ⬇</span></section>

  <!-- CINEMATIC PINNED SECTION -->
  <section id="cinematic-section">
    <!-- parallax wrapper (moves with mouse) -->
    <div class="video-parallax-wrapper" id="parallax-wrapper">
      <video id="warrior-video" muted playsinline preload="auto">
        <source src="warrior-optimized.mp4" type="video/mp4">
        <!-- fallback message if video missing (silent) -->
      </video>
    </div>

    <!-- overlay content -->
    <div class="hero-overlay">
      <h1>WARRIOR</h1>
      <p>scroll to command time</p>
      <div class="glow-line"></div>
    </div>
    <div class="scroll-hint">scroll · scrub</div>
  </section>

  <!-- bottom spacer -->
  <section class="spacer"><span>⬆ scroll up ⬆</span></section>

  <script>
    (function() {
      "use strict";

      // ----- register ScrollTrigger -----
      gsap.registerPlugin(ScrollTrigger);

      // ----- DOM refs -----
      const section = document.getElementById('cinematic-section');
      const wrapper = document.getElementById('parallax-wrapper');
      const video = document.getElementById('warrior-video');

      // ----- video setup: ensure it's ready -----
      // preload & mute (already muted)
      video.volume = 0;
      video.currentTime = 0;

      // ----- 1. SCROLL-DRIVEN SCRUBBING (GSAP + ScrollTrigger) -----
      // we pin the section, and scrub video.currentTime based on scroll progress
      // video duration = 6s (fallback if metadata not loaded)
      let duration = 6; // default

      // wait for metadata to get accurate duration
      video.addEventListener('loadedmetadata', function() {
        if (video.duration && isFinite(video.duration)) {
          duration = video.duration;
        }
        // ensure we're at start
        video.currentTime = 0;
      });

      // if video already loaded, set duration
      if (video.readyState >= 1 && video.duration) {
        duration = video.duration;
      }

      // create the scrub timeline: map scroll progress 0->1 to video time 0->duration
      // we use a dummy tween to drive the update
      let scrubTween = gsap.to(video, {
        currentTime: duration,
        ease: "none",
        paused: true,
        // we'll update via ScrollTrigger's onUpdate
      });

      // pin the section and scrub
      ScrollTrigger.create({
        trigger: section,
        start: "top top",
        end: "bottom bottom",
        pin: true,
        pinSpacing: true,
        anticipatePin: 1,
        invalidateOnRefresh: true,
        onUpdate: (self) => {
          // progress 0..1
          const progress = self.progress;
          // map to video time
          const targetTime = progress * duration;
          // clamp
          const clamped = Math.min(Math.max(targetTime, 0), duration);
          video.currentTime = clamped;
          // also sync the dummy tween (not strictly needed but keeps consistency)
          scrubTween.progress(progress);
        },
        onRefresh: (self) => {
          // ensure video is in sync after resize / refresh
          const progress = self.progress || 0;
          video.currentTime = progress * duration;
        }
      });

      // ----- 2. CURSOR-BASED 3D PARALLAX (mouse move + lerp) -----
      // target offsets (px)
      const MAX_X = 20;   // horizontal ±20px
      const MAX_Y = 10;   // vertical ±10px

      // current mouse position normalized to [-1, 1]
      let mouseX = 0;
      let mouseY = 0;

      // smoothed values (lerp)
      let smoothX = 0;
      let smoothY = 0;

      // track mouse movement (relative to viewport center)
      function handleMouseMove(e) {
        // get viewport dimensions
        const w = window.innerWidth;
        const h = window.innerHeight;
        // mouse position in viewport (0..1)
        const normX = (e.clientX / w) * 2 - 1;  // -1 left, 1 right
        const normY = (e.clientY / h) * 2 - 1;  // -1 top, 1 bottom

        mouseX = normX;
        mouseY = normY;
      }

      // also support touch devices: use touch events with a single touch
      function handleTouchMove(e) {
        if (e.touches.length > 0) {
          const touch = e.touches[0];
          const w = window.innerWidth;
          const h = window.innerHeight;
          const normX = (touch.clientX / w) * 2 - 1;
          const normY = (touch.clientY / h) * 2 - 1;
          mouseX = normX;
          mouseY = normY;
        }
      }

      // attach events (passive for performance)
      window.addEventListener('mousemove', handleMouseMove, { passive: true });
      window.addEventListener('touchmove', handleTouchMove, { passive: true });

      // also reset on mouse leave to avoid stuck offset? we'll keep last position.

      // ----- animation loop with lerp -----
      function animateParallax() {
        // smooth interpolation (lerp) – 0.08 gives nice cinematic lag
        const easing = 0.08;
        smoothX += (mouseX - smoothX) * easing;
        smoothY += (mouseY - smoothY) * easing;

        // map to pixel offsets
        const offsetX = smoothX * MAX_X;
        const offsetY = smoothY * MAX_Y;

        // apply transform to wrapper – hardware accelerated
        // use translate3d for GPU
        wrapper.style.transform = `translate3d(${offsetX}px, ${offsetY}px, 0px)`;
        wrapper.style.willChange = 'transform';

        // request next frame
        requestAnimationFrame(animateParallax);
      }

      // start parallax loop
      animateParallax();

      // ----- 3. LOOP HANDLING (when not scrubbing) -----
      // Actually we don't need loop because scroll scrubbing controls time.
      // But if user leaves the section, we want seamless loop? 
      // The section is pinned, so scroll scrubbing always controls the video.
      // However, if for any reason video ends (duration mismatch) we handle.
      // Since we scrub, we don't autoplay. But we ensure if video ends, 
      // it doesn't show blank: we clamp currentTime in onUpdate.
      // Additionally, if the video ends and user scrolls back, it reverses.
      // That's handled by ScrollTrigger.
      // For safety, we add 'ended' event to reset to 0 if not in scroll range? 
      // But scroll controls it, so we keep it.

      // ----- 4. RESPONSIVE & RESIZE -----
      // ScrollTrigger auto-refresh on resize, we just need to ensure video stays covered.
      // No extra action needed.

      // ----- 5. FALLBACK: if video fails to load, show placeholder? but we keep as is.
      // ----- 6. force GPU on video
      video.style.transform = 'translateZ(0)';
      video.style.backfaceVisibility = 'hidden';

      // set initial time 0
      video.currentTime = 0;

      // handle visibility change to prevent jank when tab hidden
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          // pause any potential playback? but we don't autoplay.
        }
      });

      // small extra: if video is not ready, still try.
      console.log('Cinematic warrior ready.');

      // Cleanup on page unload (optional)
      window.addEventListener('beforeunload', function() {
        // release resources
        window.removeEventListener('mousemove', handleMouseMove);
        window.removeEventListener('touchmove', handleTouchMove);
      });

    })();
  </script>

</body>
</html>
