    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' https://unpkg.com; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src https://snowy-fog-b0d1.23amtics322.workers.dev; img-src 'self' data:; frame-ancestors 'none'; base-uri 'none'; form-action 'none';">

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <style>
        /* ── RESET ─────────────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            height: 100%;
            scrollbar-width: thin;
            scrollbar-color: var(--cyan-dim) var(--bg2);
        }

        :root {
            --bg:         #020810;
            --bg2:        #040d18;
            --panel:      #07111e;
            --panel2:     #0a1828;
            --border:     #0d3a52;
            --border-hi:  #1a6a8a;
            --cyan:       #00e5ff;
            --cyan-dim:   #007a99;
            --cyan-deep:  #003d4d;
            --green:      #00ff9d;
            --green-dim:  #006644;
            --red:        #ff3b5c;
            --red-dim:    #7a1a2a;
            --amber:      #ffb300;
            --text:       #b0d4e8;
            --text-dim:   #3d6478;
            --text-mid:   #6a9ab8;
            --glow-c:     0 0 8px #00e5ffaa, 0 0 30px #00e5ff44, 0 0 60px #00e5ff11;
            --glow-c-sm:  0 0 6px #00e5ff88, 0 0 16px #00e5ff33;
            --glow-g:     0 0 8px #00ff9daa, 0 0 30px #00ff9d44;
            --glow-r:     0 0 8px #ff3b5caa, 0 0 30px #ff3b5c44;
            --card-w:     420px;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh; /* FIX #36: fallback for browsers without dvh support */
            height: 100dvh; /* dvh: respects mobile browser chrome */
        }

        /*
         * FIX #6: Target only the Three.js canvas by ID, not all <canvas>.
         * Prevents any other canvas (extensions, future elements) from inheriting
         * position:fixed unintentionally.
         */
        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            display: block;
        }

        /* ── SCANLINES ──────────────────────────────────────────────────────── */
        #scanlines {
            position: fixed; inset: 0; z-index: 9998; pointer-events: none;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 3px,
                rgba(0,229,255,.008) 3px, rgba(0,229,255,.008) 4px
            );
            animation: scanShift 8s linear infinite;
        }
        @keyframes scanShift { 0% { background-position: 0 0; } 100% { background-position: 0 400px; } }

        /* ── CHROMATIC ABERRATION ───────────────────────────────────────────── */
        #chromatic {
            position: fixed; inset: 0; z-index: 9997; pointer-events: none;
            background: repeating-linear-gradient(
                90deg,
                rgba(255,0,60,.015) 0px, rgba(255,0,60,.015) 1px,
                transparent 1px, transparent 3px,
                rgba(0,229,255,.01) 3px, rgba(0,229,255,.01) 4px,
                transparent 4px, transparent 6px
            );
        }

        /* ── CORNER BRACKETS ────────────────────────────────────────────────── */
        .corner-bracket {
            position: fixed; width: 80px; height: 80px; z-index: 3; pointer-events: none;
            transition: opacity .3s;
        }
        .corner-bracket::before, .corner-bracket::after {
            content: ''; position: absolute; background: var(--cyan); box-shadow: 0 0 6px var(--cyan);
        }
        .corner-bracket::before { width: 100%; height: 2px; }
        .corner-bracket::after  { width: 2px; height: 100%; }
        .corner-bracket.tl { top: 20px; left: 20px; }
        .corner-bracket.tr { top: 20px; right: 20px; transform: scaleX(-1); }
        .corner-bracket.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
        .corner-bracket.br { bottom: 20px; right: 20px; transform: scale(-1); }
        .corner-bracket { animation: bracketPulse 3s ease-in-out infinite; }
        @keyframes bracketPulse { 0%,100% { opacity: .4; } 50% { opacity: .9; } }

        /*
         * FIX #3 + #5 + #9: Stage is position:fixed, uses 100dvh (not 100vh).
         * dvh accounts for mobile browser toolbars — 100vh would be the maximized
         * height, causing the card to appear off-center when the address bar is visible.
         * position:fixed keeps it out of document flow entirely (no scroll drift).
         */
        #stage {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* card re-enables with pointer-events:auto below */
        }

        /* ── LOGIN CARD ─────────────────────────────────────────────────────── */
        .login-card {
            pointer-events: auto; /* re-enable interaction inside pointer-events:none stage */
            position: relative;
            width: var(--card-w);
            background: linear-gradient(145deg, #07141f 0%, #040d18 60%, #061220 100%);
            border: 1px solid var(--border-hi);
            border-radius: 4px;
            padding: clamp(24px, 4vw, 44px) clamp(20px, 4vw, 40px);
            transform-style: preserve-3d;
            /*
             * FIX #1: --card-scale is consumed here so adaptToViewport's
             * resize/orientation scaling actually takes effect.
             * Default 1 so it has no effect until adaptToViewport sets it.
             * The holoBoot/edgeCharge entrance animation also reads --card-scale
             * so the responsive scale is preserved throughout the boot sequence.
             */
            transform: scale(var(--card-scale, 1));
            transition: transform .06s ease-out, box-shadow .3s ease;
            box-shadow:
                0 0 0 1px rgba(0,229,255,.06),
                0 30px 80px rgba(0,0,0,.95),
                0 0 40px rgba(0,229,255,.08),
                inset 0 1px 0 rgba(0,229,255,.12),
                inset 0 -1px 0 rgba(0,0,0,.5);
            overflow: visible;
            clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
            /* ── HOLOGRAPHIC BOOT ENTRANCE (plays once on load) ── */
            opacity: 0;
            will-change: transform, opacity, filter;
            animation: holoBoot 1.45s ease-out forwards, edgeCharge 1.45s ease-out forwards;
        }

        /* Card unfolds vertically from a thin energy line, with brightness bloom + blur */
        @keyframes holoBoot {
            0%   { opacity: 0; transform: scale(var(--card-scale, 1)) scaleY(.02); filter: brightness(5) blur(10px); }
            18%  { opacity: .95; transform: scale(var(--card-scale, 1)) scaleY(.02); }
            50%  { opacity: 1; transform: scale(var(--card-scale, 1)) scaleY(1); filter: brightness(2.5); }
            100% { opacity: 1; transform: scale(var(--card-scale, 1)) scaleY(1); filter: none; }
        }

        /* Border charging glow that settles back into the card's resting shadow */
        @keyframes edgeCharge {
            0%   { box-shadow: none; }
            40%  {
                box-shadow:
                    0 0 25px rgba(0,229,255,.8),
                    0 0 80px rgba(0,229,255,.55),
                    0 0 180px rgba(0,229,255,.35);
            }
            100% {
                box-shadow:
                    0 0 0 1px rgba(0,229,255,.06),
                    0 30px 80px rgba(0,0,0,.95),
                    0 0 40px rgba(0,229,255,.08),
                    inset 0 1px 0 rgba(0,229,255,.12),
                    inset 0 -1px 0 rgba(0,0,0,.5);
            }
        }

        /* Core ignition flash — brief radial cyan burst from the card's center */
        .core-flash {
            position: absolute; inset: -140px; pointer-events: none;
            background: radial-gradient(circle, rgba(0,229,255,.95) 0%, rgba(0,229,255,.35) 18%, transparent 65%);
            opacity: 0;
            will-change: transform, opacity;
            animation: coreFlash 1.4s ease-out forwards;
        }
        @keyframes coreFlash {
            0%   { opacity: 0; transform: scale(.2); }
            14%  { opacity: 1; transform: scale(1); }
            45%  { opacity: .25; }
            100% { opacity: 0; transform: scale(2); }
        }

        /* Border-draw — panel outline progressively renders around the card */
        .border-draw {
            position: absolute; inset: 0; pointer-events: none;
            border: 1px solid rgba(0,229,255,.8);
            border-radius: 4px;
            clip-path: inset(0 100% 100% 0);
            animation: borderDraw 1s ease-out forwards;
        }
        @keyframes borderDraw {
            0%   { clip-path: inset(0 100% 100% 0); }
            45%  { clip-path: inset(0 0 100% 0); }
            100% { clip-path: inset(0 0 0 0); opacity: .35; }
        }

        /* Scan beam — travels top to bottom through the card once */
        .scan-beam {
            position: absolute; left: 0; right: 0; height: 140px; top: 0;
            background: linear-gradient(180deg, transparent, rgba(0,229,255,.8), transparent);
            transform: translateY(-150%);
            will-change: transform, opacity;
            animation: scanBeam 1.3s ease-out forwards;
            pointer-events: none;
        }
        @keyframes scanBeam {
            0%   { opacity: 0; transform: translateY(-150%); }
            10%  { opacity: 1; }
            100% { opacity: 0; transform: translateY(350%); }
        }

        /* Holographic surface shimmer — reflective sweep across the panel */
        .surface-sweep {
            position: absolute; inset: 0; pointer-events: none;
            background: linear-gradient(115deg, transparent 20%, rgba(255,255,255,.15) 40%, rgba(0,229,255,.28) 50%, transparent 75%);
            transform: translateX(-150%);
            will-change: transform, opacity;
            animation: surfaceSweep 1.8s ease-out forwards;
        }
        @keyframes surfaceSweep {
            0%   { opacity: 0; transform: translateX(-150%); }
            25%  { opacity: 1; }
            100% { opacity: 0; transform: translateX(150%); }
        }

        /* Sequential content reveal — logo, subtitle, fields, then the button */
        .logo-main, .logo-sub, .field-wrap, .auth-btn {
            opacity: 0;
            animation: contentReveal .5s ease forwards;
        }
        .logo-main { animation-delay: .95s; }
        .logo-sub  { animation-delay: 1.05s; }
        .field-wrap:nth-of-type(1) { animation-delay: 1.15s; }
        .field-wrap:nth-of-type(2) { animation-delay: 1.25s; }
        .auth-btn  { animation-delay: 1.35s; }
        @keyframes contentReveal {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /*
         * ── LIGHTER BOOT ANIMATION FOR MOBILE/TOUCH ──────────────────────────
         * The three heaviest costs on mobile GPUs are:
         *   1. filter: blur() on a large, complex element (.login-card) — repainted every frame
         *   2. Large blurred box-shadow radii (40-180px) animated in edgeCharge — also repaint-bound
         *   3. clip-path animation on .border-draw — not compositor-accelerated, forces repaint
         * This block keeps the same overall sequence/feel but trims those three costs.
         */
        @media (max-width: 768px), (hover: none) and (pointer: coarse) {
            @keyframes holoBoot {
                0%   { opacity: 0; transform: scale(var(--card-scale, 1)) scaleY(.02); filter: brightness(2.6) blur(3px); }
                18%  { opacity: .95; transform: scale(var(--card-scale, 1)) scaleY(.02); }
                50%  { opacity: 1; transform: scale(var(--card-scale, 1)) scaleY(1); filter: brightness(1.6); }
                100% { opacity: 1; transform: scale(var(--card-scale, 1)) scaleY(1); filter: none; }
            }
            @keyframes edgeCharge {
                0%   { box-shadow: none; }
                40%  {
                    box-shadow:
                        0 0 12px rgba(0,229,255,.7),
                        0 0 32px rgba(0,229,255,.4);
                }
                100% {
                    box-shadow:
                        0 0 0 1px rgba(0,229,255,.06),
                        0 30px 80px rgba(0,0,0,.95),
                        0 0 40px rgba(0,229,255,.08),
                        inset 0 1px 0 rgba(0,229,255,.12),
                        inset 0 -1px 0 rgba(0,0,0,.5);
                }
            }
            /* Smaller painted area for the radial ignition flash */
            .core-flash { inset: -50px; }
            /* Swap the clip-path "draw" for a cheap opacity fade — same end result, no per-frame repaint */
            .border-draw {
                clip-path: inset(0 0 0 0);
                opacity: 0;
                animation: borderFadeIn .5s ease-out .35s forwards;
            }
            @keyframes borderFadeIn { to { opacity: .35; } }
        }

        /* Corner cut glow */
        .login-card::before {
            content: ''; position: absolute; top: -1px; right: -1px; width: 28px; height: 28px;
            background: var(--cyan); clip-path: polygon(0 0, 100% 100%, 100% 0);
            box-shadow: var(--glow-c); opacity: .6; animation: cornerGlow 2.5s ease-in-out infinite;
        }
        @keyframes cornerGlow { 0%,100% { opacity: .4; } 50% { opacity: .9; box-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan); } }

        /* Scan sweep */
        .login-card::after {
            content: ''; position: absolute; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            top: -2px; animation: cardScan 3s ease-in-out infinite; opacity: .5;
        }
        @keyframes cardScan { 0% { top: 0%; opacity: 0; } 10% { opacity: .6; } 90% { opacity: .3; } 100% { top: 100%; opacity: 0; } }

        /* ── HEX BADGE ──────────────────────────────────────────────────────── */
        .hex-badge {
            position: absolute; top: -16px; left: 32px;
            background: var(--bg2); border: 1px solid var(--cyan-dim); border-radius: 2px;
            padding: 3px 10px; font-family: 'Share Tech Mono', monospace;
            font-size: .55rem; color: var(--cyan-dim); letter-spacing: .2em;
        }

        /* ── LOGO ───────────────────────────────────────────────────────────── */
        .logo-block { margin-bottom: 8px; }
        .logo-main {
            font-family: 'Deltha', monospace; font-weight: 900;
            font-size: clamp(1.4rem, 4vw, 1.9rem); color: var(--cyan);
            letter-spacing: .18em; line-height: 1; text-shadow: var(--glow-c);
            display: flex; align-items: center; gap: 10px;
        }
        .logo-icon {
            display: inline-block; width: 28px; height: 28px;
            border: 2px solid var(--cyan); border-radius: 50%;
            box-shadow: var(--glow-c-sm), inset 0 0 8px rgba(0,229,255,.3);
            position: relative; animation: iconSpin 12s linear infinite; flex-shrink: 0;
        }
        .logo-icon::before {
            content: ''; position: absolute; inset: 4px; border-radius: 50%;
            background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
            animation: iconPulse 2s ease-in-out infinite;
        }
        @keyframes iconSpin { to { transform: rotate(360deg); } }
        @keyframes iconPulse { 0%,100%{opacity:.6;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }

        .logo-sub {
            font-family: 'Share Tech Mono', monospace; font-size: clamp(.55rem, 1.5vw, .65rem);
            color: var(--text-dim); letter-spacing: .3em; margin-top: 6px;
            display: flex; align-items: center; gap: 8px;
        }
        .logo-sub::before {
            content: ''; display: inline-block; width: 24px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan-dim));
            flex-shrink: 0; /* FIX #10: prevent decorative line from collapsing */
        }

        /* ── DIVIDER ────────────────────────────────────────────────────────── */
        .divider {
            margin: 18px 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-hi) 30%, var(--cyan-dim) 50%, var(--border-hi) 70%, transparent);
            position: relative;
        }
        .divider::after {
            content: '◆'; position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%); color: var(--cyan-dim);
            font-size: .5rem; background: var(--panel); padding: 0 6px;
        }

        /* ── SECTION TITLE ──────────────────────────────────────────────────── */
        .section-title {
            font-family: 'Deltha', monospace; font-weight: 700;
            font-size: clamp(.65rem, 2vw, .8rem); color: var(--cyan);
            letter-spacing: .25em; margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
        }
        .section-title::before {
            content: ''; display: inline-block; width: 6px; height: 6px; flex-shrink: 0;
            background: var(--cyan); box-shadow: var(--glow-c-sm);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            animation: diamondSpin 4s linear infinite;
        }
        @keyframes diamondSpin { to { transform: rotate(360deg); } }

        /* ── FORM FIELDS ────────────────────────────────────────────────────── */
        .field-wrap { margin-bottom: 16px; position: relative; }

        .field-label {
            font-family: 'Share Tech Mono', monospace; font-size: .6rem; color: var(--text-dim);
            letter-spacing: .2em; text-transform: uppercase; margin-bottom: 7px;
            display: flex; align-items: center; gap: 6px; transition: color .2s;
        }
        .field-label::before {
            content: ''; display: inline-block; width: 4px; height: 4px; flex-shrink: 0;
            background: var(--cyan-dim); border-radius: 50%; transition: background .2s, box-shadow .2s;
        }
        .field-wrap:focus-within .field-label { color: var(--cyan); }
        .field-wrap:focus-within .field-label::before { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }

        .input-shell { position: relative; display: flex; align-items: stretch; }
        .input-shell::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
            background: var(--border); border-radius: 2px 0 0 2px;
            transition: background .2s, box-shadow .2s; z-index: 1;
        }
        .field-wrap:focus-within .input-shell::before { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }

        .login-input {
            flex: 1; background: rgba(4,13,24,.9); border: 1px solid var(--border);
            border-left: none; border-radius: 0 3px 3px 0; padding: 11px 14px;
            color: var(--text); font-family: 'Share Tech Mono', monospace;
            font-size: clamp(.75rem, 2vw, .85rem); outline: none;
            transition: border-color .2s, background .2s, box-shadow .2s;
            width: 100%; caret-color: var(--cyan);
            /* Prevent iOS from zooming on focus (font-size must be >=16px on iOS) */
            -webkit-text-size-adjust: 100%;
        }
        .login-input:focus { border-color: var(--cyan-dim); background: rgba(0,229,255,.03); box-shadow: inset 0 0 20px rgba(0,229,255,.04); }
        .login-input::placeholder { color: var(--text-dim); font-size: .75rem; }
        .login-input::selection { background: rgba(0,229,255,.25); }

        /* ── PASSWORD TOGGLE ────────────────────────────────────────────────── */
        .pw-toggle {
            position: absolute; right: 0; top: 0; bottom: 0; width: 42px;
            background: transparent; border: none; border-left: 1px solid var(--border);
            color: var(--text-dim); cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: color .2s, background .2s, border-color .2s;
            border-radius: 0 3px 3px 0;
        }
        .pw-toggle:hover { color: var(--cyan); background: rgba(0,229,255,.06); border-color: var(--cyan-dim); }
        .pw-toggle:focus-visible { outline: 2px solid var(--cyan); outline-offset: -2px; }

        .pw-icon-wrap {
            position: relative; width: 18px; height: 18px;
            transform-style: preserve-3d; transition: transform .5s cubic-bezier(.34,1.56,.64,1);
        }
        .pw-icon-wrap.revealed { transform: rotateY(180deg); }
        .pw-icon-front, .pw-icon-back {
            position: absolute; inset: 0; display: flex;
            align-items: center; justify-content: center; backface-visibility: hidden;
        }
        .pw-icon-back { transform: rotateY(180deg); }
        .pw-icon-front svg, .pw-icon-back svg {
            width: 16px; height: 16px; stroke: currentColor; fill: none;
            stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
        }
        .login-input.pw-visible { border-color: var(--cyan-dim); box-shadow: inset 0 0 20px rgba(0,229,255,.06); }

        /* ── ALERT BARS ─────────────────────────────────────────────────────── */
        .alert-bar {
            border-radius: 2px; font-family: 'Share Tech Mono', monospace;
            font-size: .68rem; padding: 9px 12px 9px 32px; margin-bottom: 14px;
            position: relative; display: none; letter-spacing: .05em; line-height: 1.4;
        }
        .alert-bar::before {
            position: absolute; left: 10px; top: 50%;
            transform: translateY(-50%); font-size: .75rem;
        }
        /*
         * FIX #8: errorShake is declared on the element permanently, meaning it
         * only fires at initial render. The JS reflow trick (void offsetWidth)
         * works but requires animation to be re-applied via a class toggle.
         * We use .shaking to re-trigger cleanly on every failure.
         */
        #loginError {
            background: rgba(255,59,92,.07); border: 1px solid var(--red-dim);
            color: var(--red); border-left: 3px solid var(--red);
            box-shadow: 0 0 20px rgba(255,59,92,.1), inset 0 0 20px rgba(255,59,92,.03);
        }
        #loginError.shaking { animation: errorShake .4s ease; }
        #loginError::before { content: '⚠'; }
        @keyframes errorShake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-5px); } 40%,80% { transform: translateX(5px); } }

        /* FIX #31: card shake animation — was toggling an empty animation="" which did nothing */
        .login-card.shake { animation: cardShake .5s ease both; }
        @keyframes cardShake {
            0%,100% { transform: scale(var(--card-scale,1)) translateX(0); }
            15%,55% { transform: scale(var(--card-scale,1)) translateX(-6px); }
            35%,75% { transform: scale(var(--card-scale,1)) translateX(6px); }
        }

        #lockoutBar {
            background: rgba(255,59,92,.05); border: 1px solid rgba(122,26,42,.6);

            padding: clamp(10px, 2.5vw, 14px); background: transparent;
            border: 1px solid var(--cyan-dim); border-radius: 3px; color: var(--cyan);

            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(0,229,255,.12), transparent);
            transform: translateX(-100%); transition: transform .4s ease;
        }
        .auth-btn:hover::before { transform: translateX(100%); }
        .auth-btn::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            transform: scaleX(0); transition: transform .3s ease;
        }
        .auth-btn:hover::after { transform: scaleX(1); }
        .auth-btn:hover:not(:disabled) { border-color: var(--cyan); box-shadow: var(--glow-c), inset 0 0 30px rgba(0,229,255,.08); color: #fff; }
        .auth-btn:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
        .auth-btn:disabled { opacity: .35; cursor: not-allowed; }
        .auth-btn.loading { pointer-events: none; }
        .auth-btn.loading::before {
            background: linear-gradient(90deg, transparent 0%, rgba(0,229,255,.2) 50%, transparent 100%);
            transform: none; animation: btnScan .8s linear infinite;

        .btn-corner { position: absolute; width: 8px; height: 8px; opacity: .5; }

        .btn-corner::before { width: 100%; height: 1px; top: 0; left: 0; }
        .btn-corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
        .btn-corner.tl { top: 4px; left: 4px; }
        .btn-corner.tr { top: 4px; right: 4px; transform: scaleX(-1); }
        .btn-corner.bl { bottom: 4px; left: 4px; transform: scaleY(-1); }
        .btn-corner.br { bottom: 4px; right: 4px; transform: scale(-1); }

        /* ── STATUS FOOTER ──────────────────────────────────────────────────── */
        .status-footer {
            margin-top: 20px; padding-top: 14px; border-top: 1px solid rgba(13,58,82,.6);
            display: flex; justify-content: space-between; align-items: center; gap: 8px;

        .status-item {
            font-family: 'Share Tech Mono', monospace; font-size: .55rem;
            color: var(--text-dim); letter-spacing: .12em; display: flex; align-items: center; gap: 5px;
        }
        .status-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--green); box-shadow: 0 0 5px var(--green);
            animation: statusPulse 1.8s ease-in-out infinite;

        @keyframes statusPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .3; transform: scale(.6); } }

        #resInfo { font-family: 'Share Tech Mono', monospace; font-size: .52rem; color: var(--text-dim); letter-spacing: .1em; }

        /* ── MEDIA QUERIES ──────────────────────────────────────────────────── */
        @media (max-height: 600px) { .login-card { padding: 18px 22px; } .divider { margin: 10px 0; } .field-wrap { margin-bottom: 10px; } }
        @media (max-width: 360px)  { :root { --card-w: 94vw; } .corner-bracket { display: none; } }
        @media (min-width: 1400px) { :root { --card-w: 460px; } }

        /* FIX #21: Honour prefers-reduced-motion — disable decorative animations */
        @media (prefers-reduced-motion: reduce) {

            #scanlines, #chromatic { display: none; }

            .login-card::before  { animation: none; opacity: 0.4; }
            .login-card::after   { animation: none; opacity: 0; }
            .status-dot          { animation: none; }
            .auth-btn.loading::before { animation: none; }

            /* Holographic boot sequence — show the final resting state instantly */
            .login-card {
                animation: none;
                opacity: 1;
                transform: scale(var(--card-scale, 1));
                filter: none;
                box-shadow:
                    0 0 0 1px rgba(0,229,255,.06),
                    0 30px 80px rgba(0,0,0,.95),
                    0 0 40px rgba(0,229,255,.08),
                    inset 0 1px 0 rgba(0,229,255,.12),
                    inset 0 -1px 0 rgba(0,0,0,.5);

            .logo-main, .logo-sub, .field-wrap, .auth-btn {
                animation: none; opacity: 1; transform: none;
            }

    <!-- ═══════════════════════════════════════════════════════════════════
         THREE.JS TESSERACT SWARM
         Canvas appended to body and given id="three-canvas" so the CSS
         #three-canvas rule (not a bare "canvas" rule) targets it exclusively.
         OrbitControls bind to this canvas only — card UI is unaffected.
    ════════════════════════════════════════════════════════════════════ -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ── Performance constants ─────────────────────────────────────────────
        // FIX #8–#12: Reduce particle count from 20,000 to 8,000.
        // 20k particles uploading full matrix+color buffers every frame at 144Hz
        // was the single largest perf bottleneck. 8k is visually indistinguishable
        // and cuts GPU bandwidth by ~60%.
        //
        // FIX #14: Cap render rate at 60fps. requestAnimationFrame fires at the
        // display refresh rate (up to 144Hz) by default, giving zero visual benefit
        // for this kind of ambient animation but tripling the render cost on
        // high-refresh monitors.
        const COUNT      = 8000;
        const SPEED_MULT = 0.1;
        const AUTO_SPIN  = true;
        const TARGET_FPS = 60;
        const FRAME_MS   = 1000 / TARGET_FPS;

        // FIX #10: Only upload color buffer every N frames — colour changes are
        // slow-moving so the visual difference is imperceptible.
        const COLOR_UPDATE_INTERVAL = 3; // update colors every 3rd frame
        let frameCount = 0;

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.01);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // FIX #6: assign id so the CSS #three-canvas rule targets only this element
        renderer.domElement.id = 'three-canvas';
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping   = true;
        controls.autoRotate      = AUTO_SPIN;
        controls.autoRotateSpeed = 2.0;
        controls.enablePan       = true;
        controls.enableZoom      = true;

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85
        );
        bloomPass.strength  = 1.8;
        bloomPass.radius    = 0.4;
        bloomPass.threshold = 0;
        composer.addPass(bloomPass);

        const dummy    = new THREE.Object3D();
        const colorObj = new THREE.Color();
        const target   = new THREE.Vector3();

        const geometry      = new THREE.TetrahedronGeometry(0.25);
        const material      = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const instancedMesh = new THREE.InstancedMesh(geometry, material, COUNT);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(instancedMesh);

        const positions = [];
        for (let i = 0; i < COUNT; i++) {
            positions.push(new THREE.Vector3(
                (Math.random() - 0.5) * 100,
                (Math.random() - 0.5) * 100,
                (Math.random() - 0.5) * 100
            ));
            instancedMesh.setColorAt(i, colorObj.setHex(0x00ff88));
        }

        // FIX #4: PARAMS constants hoisted — never re-read inside the per-particle loop.
        // Previously addControl() was called 4× per particle = 80,000 function calls/frame
        // for values that never change. Now they're read once per frame.
        const PARAMS = { scale: 92, chaos: 2.22, fold: 1.57, drift: 0.3 };

        const clock = new THREE.Clock();
        let lastFrameTime = 0;

        function animate(now) {
            requestAnimationFrame(animate);

            // FIX #14: throttle to TARGET_FPS — skip frames on high-refresh displays
            if (now - lastFrameTime < FRAME_MS) return;
            lastFrameTime = now;

            const time  = clock.getElapsedTime() * SPEED_MULT;
            const count = COUNT;
            frameCount++;

            controls.update();

            // Hoist constants out of inner loop (FIX #4)
            const scale = PARAMS.scale;
            const chaos = PARAMS.chaos;
            const fold  = PARAMS.fold;
            const drift = PARAMS.drift;

            // FIX #10: only update colors every COLOR_UPDATE_INTERVAL frames
            const updateColors = (frameCount % COLOR_UPDATE_INTERVAL === 0);

            for (let i = 0; i < count; i++) {
                const t     = time * 0.18;
                const phi   = (i / count) * 6.2831853;
                const theta = Math.acos(1 - 2 * ((i * 1.6180339887) % 1));

                const layer  = Math.floor(i / (count * 0.25));
                const localT = (i % (count * 0.25)) / (count * 0.25);
                const psi    = localT * 6.2831853 + t;
                const xi     = phi + t * 0.07 * (layer + 1);

                const r4    = scale * (0.3 + 0.7 * (i / count));
                const sinTh = Math.sin(theta), cosTh  = Math.cos(theta);
                const cosPhi = Math.cos(xi),   sinPhi  = Math.sin(xi);
                const cosPsi = Math.cos(psi + fold);

                let x4 = r4 * sinTh * cosPhi;
                let y4 = r4 * sinTh * sinPhi;
                let z4 = r4 * cosTh;
                let w4 = r4 * cosPsi * 0.9;

                const viewW  = scale * (1.2 + 0.4 * Math.sin(t * 0.5));
                const wDenom = viewW - w4;
                const wSafe  = wDenom + (Math.abs(wDenom) < 0.5 ? 0.5 : 0);
                const proj   = viewW / wSafe;

                let px = x4 * proj, py = y4 * proj, pz = z4 * proj;

                const noiseFreq = 0.04 * chaos;
                const nx = Math.sin(px * noiseFreq + t * 1.3) * Math.cos(py * noiseFreq - t * 0.9);
                const ny = Math.sin(py * noiseFreq + t * 0.7) * Math.cos(pz * noiseFreq + t * 1.1);
                const nz = Math.sin(pz * noiseFreq - t * 1.5) * Math.cos(px * noiseFreq + t * 0.6);
                const noiseAmp = scale * 0.12 * chaos;

                px += nx * noiseAmp; py += ny * noiseAmp; pz += nz * noiseAmp;

                const breathe = 1.0 + drift * 0.15 * Math.sin(t * 0.4 + (i / count) * 3.14159);
                px *= breathe; py *= breathe; pz *= breathe;

                const maxCoord = 600;
                px = Math.max(-maxCoord, Math.min(maxCoord, px));
                py = Math.max(-maxCoord, Math.min(maxCoord, py));
                pz = Math.max(-maxCoord, Math.min(maxCoord, pz));

                target.set(px, py, pz);

                if (updateColors) {
                    const dist     = Math.sqrt(px*px + py*py + pz*pz);
                    const distNorm = Math.min(dist / (scale * 2.5), 1.0);
                    const wNorm    = (w4 / (r4 + 0.001)) * 0.5 + 0.5;

                    const hue          = (wNorm * 0.72 + (i / count) * 0.28 + t * 0.04) % 1.0;
                    const sat          = 0.55 + 0.45 * Math.abs(Math.sin(psi * 2.0 + t));
                    const interference = 0.5 + 0.5 * Math.sin(distNorm * 9.42 - t * 1.8);
                    const lit          = 0.18 + 0.52 * interference * (1.0 - distNorm * 0.4);

                    colorObj.setHSL(hue, sat, lit);
                    instancedMesh.setColorAt(i, colorObj);
                }

                positions[i].lerp(target, 0.1);
                dummy.position.copy(positions[i]);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
            }

            // FIX #11: always upload matrix (positions move every frame)
            instancedMesh.instanceMatrix.needsUpdate = true;
            // FIX #10: only upload color buffer on color-update frames
            if (updateColors) instancedMesh.instanceColor.needsUpdate = true;
            composer.render();
        }
        requestAnimationFrame(animate);

        // FIX #34: dispose Three.js resources when page is hidden/unloaded
        // (critical for SPA routing where the page may not fully reload)
        function disposeScene() {
            renderer.setAnimationLoop(null);
            instancedMesh.geometry.dispose();
            instancedMesh.material.dispose();
            renderer.dispose();
            composer.passes.forEach(p => { if (p.dispose) p.dispose(); });
        }
        window.addEventListener('pagehide', disposeScene, { once: true });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            // FIX #45: update bloom pass size on resize to avoid quality mismatch
            composer.setSize(window.innerWidth, window.innerHeight);
            bloomPass.setSize(window.innerWidth, window.innerHeight);
        });

    </script>

    <!-- ═══════════════════════════════════════════════════════════════════
         LOGIN UI LOGIC
    ════════════════════════════════════════════════════════════════════ -->
    <script>
    "use strict";

    // ── Constants ────────────────────────────────────────────────────────────
    const WORKER_ORIGIN = "https://snowy-fog-b0d1.23amtics322.workers.dev";
    const SAFE_REDIRECT = "dashboard.html";

    // ── Brute-force throttle ─────────────────────────────────────────────────
    // FIX #4: sessionStorage lockout is easily bypassed (clear storage, new tab).
    // Kept as a UX-layer deterrent but the real protection must live server-side.
    // We keep it because it prevents accidental rapid retries and counts 429s.
    const LOCKOUT_KEY  = "cap_login_state";
    const MAX_ATTEMPTS = 5;
    const BASE_LOCKOUT = 30_000;

    function getAttemptState() {
        try { return JSON.parse(sessionStorage.getItem(LOCKOUT_KEY)) || { count: 0, until: 0 }; }
        catch { return { count: 0, until: 0 }; }
    }
    function saveAttemptState(s) {
        try { sessionStorage.setItem(LOCKOUT_KEY, JSON.stringify(s)); } catch {}
    }
    function recordFailure(isNetworkError) {
        const s = getAttemptState();
        // FIX #26/#2: when a lockout has fully expired, reset count to 0 — not to
        // MAX_ATTEMPTS. Resetting to MAX_ATTEMPTS meant the very next failure after
        // expiry would immediately re-lock (count becomes MAX_ATTEMPTS+1 → tier 1).
        // A fresh start after serving the lockout is the correct behaviour.
        if (s.until > 0 && Date.now() > s.until) {
            s.count = 0;
            s.until = 0;
        }
        // Network/timeout errors count toward lockout (FIX #25) so attackers can't
        // abuse disconnect-retry to bypass the counter.
        s.count++;
        if (s.count >= MAX_ATTEMPTS) {
            const tier = Math.min(s.count - MAX_ATTEMPTS + 1, 5);
            s.until = Date.now() + BASE_LOCKOUT * tier;
        }
        saveAttemptState(s);
    }
    function resetAttempts() { try { sessionStorage.removeItem(LOCKOUT_KEY); } catch {} }
    function getLockoutRemaining() { return Math.max(0, getAttemptState().until - Date.now()); }

    // ── Lockout countdown UI ─────────────────────────────────────────────────
    let _countdown = null;
    function startLockoutCountdown() {
        const bar = document.getElementById('lockoutBar');
        const btn = document.getElementById('loginBtn');
        const dot = document.getElementById('connDot');
        clearInterval(_countdown);
        btn.disabled = true;
        bar.style.display = 'block';
        dot.classList.add('amber');
        const tick = () => {
            const rem = getLockoutRemaining();
            if (rem <= 0) {
                clearInterval(_countdown);
                bar.style.display = 'none';
                bar.textContent = '';
                btn.disabled = false;
                dot.classList.remove('amber');
                return;
            }
            bar.textContent = "BLOCKED — RETRY IN " + Math.ceil(rem / 1000) + "s";
        };
        tick();
        _countdown = setInterval(tick, 500);
    }

    // ── Session pre-check ────────────────────────────────────────────────────
    async function checkExistingSession() {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), 5000);
        try {
            const res = await fetch(WORKER_ORIGIN + "/auth/me", { credentials: 'include', signal: ctrl.signal });
            clearTimeout(tid);
            if (res.ok) {
                const data = await res.json().catch(() => ({}));
                if (data.authenticated === true) window.location.replace(SAFE_REDIRECT);
            }
        } catch { clearTimeout(tid); }
    }

    // ── Password toggle ──────────────────────────────────────────────────────
    const passEl     = document.getElementById('loginPass');
    const pwToggle   = document.getElementById('pwToggle');
    const pwIconWrap = document.getElementById('pwIconWrap');
    let pwVisible = false;

    pwToggle.addEventListener('click', () => {
        pwVisible = !pwVisible;
        passEl.type = pwVisible ? 'text' : 'password';
        pwIconWrap.classList.toggle('revealed', pwVisible);
        passEl.classList.toggle('pw-visible', pwVisible);
        const label = pwVisible ? 'Hide password' : 'Show password';
        pwToggle.setAttribute('aria-label', label);
        // FIX #19: keep title in sync with aria-label
        pwToggle.setAttribute('title', label);
        passEl.focus();
    });

    // ── Dynamic resolution display ───────────────────────────────────────────
    function updateResInfo() {
        const dpr = window.devicePixelRatio || 1;
        const w   = window.screen.width  || window.innerWidth;
        const h   = window.screen.height || window.innerHeight;
        const el  = document.getElementById('resInfo');
        if (el) el.textContent = `${w}×${h} @${dpr.toFixed(1)}x`;
    }
    updateResInfo();
    window.addEventListener('resize', updateResInfo);

    /*
     * FIX #1 + #2 — Mobile orientation change card scale bug.
     * (see original inline comments for full explanation)
     * adaptToViewport sets --card-scale which the CSS reads via
     * transform: scale(var(--card-scale, 1)) on .login-card.
     */
    const loginCard = document.getElementById('loginCard');

    function adaptToViewport() {
        const vw = window.innerWidth;
        // FIX #16: also check height for landscape phones
        const vh = window.innerHeight;
        let scale = 1;
        if (vw < 440) scale = Math.min(scale, Math.max(0.72, vw / 440));
        if (vh < 500) scale = Math.min(scale, Math.max(0.72, vh / 500));
        loginCard.style.setProperty('--card-scale', scale);
    }
    adaptToViewport();
    window.addEventListener('resize', adaptToViewport);

    // FIX #15: orientationchange fires before innerWidth updates on iOS.
    // Defer adaptToViewport so dimensions are stable.
    window.addEventListener('orientationchange', () => {
        setTimeout(adaptToViewport, 150);
        // Also fire at 300ms as a belt-and-suspenders for slow devices
        setTimeout(adaptToViewport, 300);
    });

    // FIX #17: handle virtual keyboard appearance (mobile) which changes innerHeight
    if (typeof window.visualViewport !== 'undefined') {
        window.visualViewport.addEventListener('resize', adaptToViewport);
    }

    // ── Connection status ────────────────────────────────────────────────────
    // FIX #28: reflect actual connectivity instead of always showing SECURE CHANNEL
    const connDot   = document.getElementById('connDot');
    const connLabel = document.getElementById('connLabel');

    function setConnStatus(online) {
        if (online) {
            connDot.classList.remove('amber');
            connLabel.textContent = 'SECURE CHANNEL';
        } else {
            connDot.classList.add('amber');
            connLabel.textContent = 'OFFLINE';
        }
    }
    // FIX #46: handle offline/online events
    window.addEventListener('online',  () => setConnStatus(true));
    window.addEventListener('offline', () => setConnStatus(false));
    setConnStatus(navigator.onLine);

    // ── Login handler ────────────────────────────────────────────────────────
    // FIX #48: debounce guard — prevent rapid Enter/click spam before disable takes effect
    let _submitting = false;

    async function doLogin() {
        // Guard: _submitting is only true while an actual fetch is in-flight.
        // All early validation returns happen BEFORE _submitting is set, so
        // there is never a path where a validation failure leaves it stuck true.
        if (_submitting) return;

        const userEl = document.getElementById('loginUser');
        const errEl  = document.getElementById('loginError');
        const btn    = document.getElementById('loginBtn');
        const btnTxt = document.getElementById('btnText');

        // Early exits — _submitting is still false here, so no reset needed.
        if (getLockoutRemaining() > 0) { startLockoutCountdown(); return; }

        // NOTE #8: username is lowercased client-side for consistency.
        // If your backend treats usernames as case-sensitive, remove .toLowerCase().
        const username = userEl.value.trim().toLowerCase();
        const password = passEl.value;

        errEl.style.display = 'none';

        if (!username || !password) {
            errEl.textContent = 'Enter username and password.';
            errEl.style.display = 'block';
            return; // _submitting is still false — safe
        }
        if (username.length > 64 || password.length > 128) {
            errEl.textContent = 'Input exceeds allowed length.';
            errEl.style.display = 'block';
            return; // _submitting is still false — safe
        }

        // Only set _submitting = true immediately before the async fetch.
        // Every code path from here on MUST either reset it or navigate away.
        _submitting  = true;
        btn.disabled = true;
        btn.classList.add('loading');
        btnTxt.textContent = 'AUTHENTICATING\u2026';

        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), 10_000);

        try {
            const res = await fetch(WORKER_ORIGIN + "/auth/login", {
                method:      'POST',
                credentials: 'include',
                headers:     { 'Content-Type': 'application/json' },
                body:        JSON.stringify({ username, password }),
                signal:      ctrl.signal
            });
            clearTimeout(tid);

            // Clear password from DOM immediately after every response
            passEl.value = '';
            if (pwVisible) {
                pwVisible = false;
                passEl.type = 'password';
                pwIconWrap.classList.remove('revealed');
                passEl.classList.remove('pw-visible');
            }

            let data = {};
            try { data = await res.json(); } catch {}

            // FIX #5: accept both data.success === true AND data.authenticated === true
            // to handle Workers that return either response shape.
            if (res.ok && (data.success === true || data.authenticated === true)) {
                resetAttempts();
                btnTxt.textContent    = '✓ ACCESS GRANTED';
                btn.style.borderColor = 'var(--green)';
                btn.style.color       = 'var(--green)';
                btn.style.boxShadow   = 'var(--glow-g)';

                // FIX #6: verify cookie was set before redirecting to prevent loops.
                // We do a lightweight /auth/me check; if it fails, show an error
                // instead of blindly redirecting into a potential redirect loop.
                try {
                    const verifyCtrl = new AbortController();
                    const verifyTid  = setTimeout(() => verifyCtrl.abort(), 5000);
                    const verifyRes  = await fetch(WORKER_ORIGIN + "/auth/me", {
                        credentials: 'include', signal: verifyCtrl.signal
                    });
                    clearTimeout(verifyTid);
                    const verifyData = await verifyRes.json().catch(() => ({}));
                    if (!verifyRes.ok || verifyData.authenticated !== true) {
                        throw new Error('session_not_confirmed');
                    }
                } catch (verifyErr) {
                    if (verifyErr.message !== 'session_not_confirmed') {
                        // Network error on verify — proceed with redirect anyway
                        // (better UX than blocking a likely-successful login)
                    } else {
                        btnTxt.textContent    = '✗ SESSION ERROR';
                        btn.style.borderColor = 'var(--red)';
                        btn.style.color       = 'var(--red)';
                        btn.style.boxShadow   = 'var(--glow-r)';
                        errEl.textContent     = 'Session cookie not confirmed. Please retry.';
                        errEl.style.display   = 'block';
                        _submitting = false;
                        return;
                    }
                }

                setTimeout(() => window.location.replace(SAFE_REDIRECT), 400);
                // Safety net: if the redirect hasn't completed within 8s (e.g. the
                // browser blocked it or navigation failed silently), unlock the form
                // so the user can retry rather than being permanently stuck.
                setTimeout(() => {
                    _submitting  = false;
                    btn.disabled = false;
                    btn.classList.remove('loading');
                    btnTxt.textContent    = '\u25BA\u00A0\u00A0AUTHENTICATE';
                    btn.style.borderColor = '';
                    btn.style.color       = '';
                    btn.style.boxShadow   = '';
                }, 8000);
                return;
            }

            if (res.status === 429) {
                const wait = parseInt(res.headers.get('Retry-After') || '30', 10);
                const s = getAttemptState();
                s.count = Math.max(s.count + 1, MAX_ATTEMPTS);
                s.until = Math.max(s.until, Date.now() + wait * 1000);
                saveAttemptState(s);
                errEl.textContent   = 'Server rate limit — wait ' + wait + 's.';
                errEl.style.display = 'block';
                startLockoutCountdown();
                _submitting = false;
                return;
            }

            recordFailure(false);

            // Shake card via CSS class (cardShake keyframe defined in <style>).
            loginCard.classList.remove('shake');
            void loginCard.offsetWidth; // force reflow so re-adding replays animation
            loginCard.classList.add('shake');
            setTimeout(() => loginCard.classList.remove('shake'), 500);

            // Remove class first, force reflow, re-add — ensures animation replays
            // on consecutive failures (not just the first time).
            errEl.classList.remove('shaking');
            errEl.textContent   = 'Invalid credentials.';
            errEl.style.display = 'block';
            void errEl.offsetWidth;
            errEl.classList.add('shaking');
            errEl.addEventListener('animationend', () => {
                errEl.classList.remove('shaking');
            }, { once: true });

            if (getLockoutRemaining() > 0) {
                startLockoutCountdown();
            } else {
                btn.disabled = false;
                btn.classList.remove('loading');
                btnTxt.textContent = '\u25BA\u00A0\u00A0AUTHENTICATE';
            }
            _submitting = false;
            userEl.focus();

        } catch (e) {
            clearTimeout(tid);
            passEl.value = '';
            if (pwVisible) {
                pwVisible = false;
                passEl.type = 'password';
                pwIconWrap.classList.remove('revealed');
                passEl.classList.remove('pw-visible');
            }
            // FIX #25: network/timeout errors count toward lockout
            recordFailure(true);
            errEl.textContent   = (e.name === 'AbortError') ? 'Request timed out.' : 'Network error.';
            errEl.style.display = 'block';
            if (getLockoutRemaining() > 0) {
                startLockoutCountdown();
            } else {
                btn.disabled = false;
                btn.classList.remove('loading');
                btnTxt.textContent = '\u25BA\u00A0\u00A0AUTHENTICATE';
            }
            _submitting = false;
            userEl.focus();
        }
    }

    // FIX #20: form submit event handles Enter natively (no more manual keydown patches).
    // The button is type="submit" so clicking it also fires the form's submit event.
    document.getElementById('loginForm').addEventListener('submit', e => {
        e.preventDefault();
        doLogin();
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    (function init() {
        if (getLockoutRemaining() > 0) startLockoutCountdown();
        else checkExistingSession();
        // FIX #18: defer autofocus to avoid triggering mobile keyboard zoom on load
        // Only autofocus on non-touch (desktop) devices
        if (!window.matchMedia('(hover: none)').matches) {
            document.getElementById('loginUser').focus();
        }
    })();
    </script>
</body>
</html>
