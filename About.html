<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nytherionx — Cosmic darkness that rewrites future beneath neon stars.</title>
  <!-- Tailwind CSS v3 + Lucide Icons (via CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons (latest) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Fonts: Inter + Playfair Display (italic) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet">
  <style>
    /* custom overrides + animations + reset */
    * {
      font-family: 'Inter', sans-serif;
    }
    .font-playfair {
      font-family: 'Playfair Display', serif;
    }
    /* custom animations exactly as spec */
    @keyframes heroReveal {
      0% {
        opacity: 0;
        transform: translateY(28px);
        filter: blur(12px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }
    @keyframes heroFadeUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes heroZoom {
      0% {
        transform: scale(1.12);
      }
      100% {
        transform: scale(1);
      }
    }
    .hero-anim {
      opacity: 0;
      animation-fill-mode: forwards;
      animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
    }
    .hero-reveal {
      animation-name: heroReveal;
      animation-duration: 1.1s;
    }
    .hero-fade {
      animation-name: heroFadeUp;
      animation-duration: 1s;
    }
    .hero-zoom {
      animation: heroZoom 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @media (prefers-reduced-motion: reduce) {
      .hero-anim, .hero-zoom {
        animation: none;
        opacity: 1;
      }
    }
    /* smooth mask transitions & no flicker */
    .reveal-layer-masked {
      mask-size: 100% 100% !important;
      -webkit-mask-size: 100% 100% !important;
    }
    /* reset any default margin/padding for full bleed */
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
  </style>
</head>
<body class="min-h-screen bg-white tracking-[-0.02em]" style="font-family: 'Inter', sans-serif;">

  <!-- Fixed Navigation (z-index 100) -->
  <nav class="fixed top-0 left-0 right-0 z-[100] flex items-center justify-between p-4 sm:p-5 pointer-events-auto">
    <!-- Left: SVG logo + wordmark -->
    <div class="flex items-center gap-2">
      
      <span class="text-white text-2xl font-playfair italic">Nytherion</span>
    </div>

    <!-- Center pill (hidden on mobile, visible md+) -->
    <div class="hidden md:flex absolute left-1/2 -translate-x-1/2 bg-white/20 backdrop-blur-md border border-white/30 rounded-full px-2 py-2 items-center gap-1">
      <button class="bg-white text-gray-900 px-4 py-1.5 rounded-full text-sm font-medium transition-all">Login page</button>
      <button class="text-white/80 hover:bg-white/20 hover:text-white transition-colors px-4 py-1.5 rounded-full text-sm font-medium">Dashboard</button>
      <button class="text-white/80 hover:bg-white/20 hover:text-white transition-colors px-4 py-1.5 rounded-full text-sm font-medium">Nytherix Admin</button>
      <button class="text-white/80 hover:bg-white/20 hover:text-white transition-colors px-4 py-1.5 rounded-full text-sm font-medium">Settings</button>
      <button class="text-white/80 hover:bg-white/20 hover:text-white transition-colors px-4 py-1.5 rounded-full text-sm font-medium">Nytherix user-end</button>
    </div>

    <!-- Mobile hamburger placeholder (md:hidden) -->
    <div class="md:hidden">
      <button class="text-white p-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
  </nav>

  <!-- MAIN HERO SECTION (full viewport with 100dvh) -->
  <section class="relative w-full overflow-hidden bg-black" style="height: 100dvh;">

    <!-- 1. Base image (z-10) with ken burns zoom-out - VISIBLE.PNG -->
    <div class="absolute inset-0 bg-center bg-cover bg-no-repeat z-10 hero-zoom"
         style="background-image: url('visible.png');">
    </div>

    <!-- 2. REVEAL LAYER container (z-30) where spotlight mask will be applied - HIDDEN.PNG on top -->
    <div id="revealLayerContainer" class="absolute inset-0 z-30 pointer-events-none bg-center bg-cover bg-no-repeat"
         style="background-image: url('hidden.png');">
    </div>

    <!-- hidden canvas used to generate dynamic radial gradient mask -->
    <canvas id="spotlightCanvas" class="absolute inset-0 pointer-events-none" style="display: none;"></canvas>

    <!-- 3. Heading (z-50) with staggered blur reveal -->
    <div class="absolute top-[14%] left-0 right-0 flex flex-col items-center text-center px-5 pointer-events-none z-50">
      <h1 class="text-white leading-[0.95]">
        <span class="block font-playfair italic font-normal text-5xl sm:text-7xl md:text-8xl hero-anim hero-reveal"
              style="letter-spacing: -0.05em; animation-delay: 0.25s;">
          Cosmic Darkness
        </span>
        <span class="block font-normal text-5xl sm:text-7xl md:text-8xl -mt-1 hero-anim hero-reveal"
              style="letter-spacing: -0.08em; animation-delay: 0.42s;">
          that rewrites future beneath neon stars.
        </span>
      </h1>
    </div>

    <!-- 4. Bottom-left paragraph (hidden on mobile, sm:block) -->
    <div class="hidden sm:block absolute bottom-14 left-10 md:left-14 max-w-[260px] z-50 hero-anim hero-fade"
         style="animation-delay: 0.7s;">
      <p class="text-sm text-white/80 leading-relaxed">
        Explanation text.
    </div>

    <!-- 5. Bottom-right block (full-width on mobile, right-anchored from sm) -->
    <div class="absolute bottom-10 sm:bottom-24 left-5 right-5 sm:left-auto sm:right-10 md:right-14 max-w-full sm:max-w-[260px] flex flex-col items-start gap-4 sm:gap-5 z-50 hero-anim hero-fade"
         style="animation-delay: 0.85s;">
      <p class="text-xs sm:text-sm text-white/80 leading-relaxed">
        Explanation Text
      </p>
      
    </div>
  </section>

  <script>
    (function() {
      // ----- CONFIG -----
      const SPOTLIGHT_R = 260;     // radius in pixels
      const BG_IMAGE_2_URL = "hidden.png";
      
      // DOM elements
      const revealDiv = document.getElementById('revealLayerContainer');
      const canvas = document.getElementById('spotlightCanvas');
      
      if (!revealDiv || !canvas) {
        console.warn("Missing required elements for spotlight mask");
        return;
      }
      
      // ensure background image is set (already inline but for consistency)
      revealDiv.style.backgroundImage = `url('${BG_IMAGE_2_URL}')`;
      revealDiv.style.backgroundSize = 'cover';
      revealDiv.style.backgroundPosition = 'center';
      revealDiv.style.backgroundRepeat = 'no-repeat';
      
      // Mouse tracking with smoothing
      let mouseRaw = { x: -999, y: -999 };
      let smoothPos = { x: -999, y: -999 };
      let rafId = null;
      let currentMaskDataURL = null;
      
      // dimensions for canvas
      let winWidth = window.innerWidth;
      let winHeight = window.innerHeight;
      
      function updateCanvasSize() {
        winWidth = window.innerWidth;
        winHeight = window.innerHeight;
        canvas.width = winWidth;
        canvas.height = winHeight;
        // force mask re-generation on next frame after resize
        if (rafId) {
          // will re-render on next animation frame automatically
        }
      }
      
      // resize observer / event
      window.addEventListener('resize', () => {
        updateCanvasSize();
        // immediately re-render mask with latest cursor (or keep hidden if offscreen)
        if (smoothPos.x !== -999 && smoothPos.y !== -999) {
          generateAndApplyMask(smoothPos.x, smoothPos.y);
        } else {
          // if no valid cursor, hide mask => full base visible
          revealDiv.style.maskImage = 'none';
          revealDiv.style.webkitMaskImage = 'none';
        }
      });
      
      // Mouse move: store raw coordinates
      function onMouseMove(e) {
        mouseRaw.x = e.clientX;
        mouseRaw.y = e.clientY;
      }
      
      // Generate radial gradient mask on canvas and apply to reveal div
      function generateAndApplyMask(cx, cy) {
        if (!canvas || !revealDiv) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        
        // clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Guard for invalid positions (out of bounds or initial)
        if (cx < -1000 || cy < -1000 || cx > winWidth + 500 || cy > winHeight + 500) {
          // if cursor is extremely far, hide mask to show no reveal (full base)
          revealDiv.style.maskImage = 'none';
          revealDiv.style.webkitMaskImage = 'none';
          return;
        }
        
        // Clamp to canvas boundaries (optional, but gradient stays within view)
        const safeX = Math.min(Math.max(cx, 0), winWidth);
        const safeY = Math.min(Math.max(cy, 0), winHeight);
        
        // Create radial gradient (soft edges as specified)
        const gradient = ctx.createRadialGradient(safeX, safeY, 0, safeX, safeY, SPOTLIGHT_R);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.4, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.6, 'rgba(255,255,255,0.75)');
        gradient.addColorStop(0.75, 'rgba(255,255,255,0.4)');
        gradient.addColorStop(0.88, 'rgba(255,255,255,0.12)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        
        ctx.beginPath();
        ctx.arc(safeX, safeY, SPOTLIGHT_R, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
        
        // Convert to data URL and apply as mask
        const dataURL = canvas.toDataURL();
        if (dataURL && dataURL !== currentMaskDataURL) {
          currentMaskDataURL = dataURL;
          revealDiv.style.maskImage = `url(${dataURL})`;
          revealDiv.style.webkitMaskImage = `url(${dataURL})`;
          revealDiv.style.maskSize = '100% 100%';
          revealDiv.style.webkitMaskSize = '100% 100%';
          // add a helper class to ensure no weird default masking
          revealDiv.classList.add('reveal-layer-masked');
        }
      }
      
      // RAF smoothing loop
      function updateSmoothing() {
        // lerp factor 0.1 for natural trailing
        smoothPos.x += (mouseRaw.x - smoothPos.x) * 0.1;
        smoothPos.y += (mouseRaw.y - smoothPos.y) * 0.1;
        
        // Only apply mask if the cursor is within reasonable bounds (to avoid showing mask at -999)
        const isValid = (mouseRaw.x !== -999 && mouseRaw.y !== -999) && 
                        (smoothPos.x >= -200 && smoothPos.y >= -200 && 
                         smoothPos.x <= winWidth + 200 && smoothPos.y <= winHeight + 200);
        
        if (isValid) {
          generateAndApplyMask(smoothPos.x, smoothPos.y);
        } else {
          // If mouse hasn't moved into view yet, hide mask (fully base image)
          if (mouseRaw.x === -999 && mouseRaw.y === -999) {
            revealDiv.style.maskImage = 'none';
            revealDiv.style.webkitMaskImage = 'none';
          } else {
            if (mouseRaw.x < 0 || mouseRaw.y < 0 || mouseRaw.x > winWidth || mouseRaw.y > winHeight) {
              revealDiv.style.maskImage = 'none';
              revealDiv.style.webkitMaskImage = 'none';
            } else {
              generateAndApplyMask(smoothPos.x, smoothPos.y);
            }
          }
        }
        
        rafId = requestAnimationFrame(updateSmoothing);
      }
      
      // initialize dimensions + start tracking
      function init() {
        updateCanvasSize();
        // set initial positions to offscreen so mask is hidden until first move
        mouseRaw = { x: -999, y: -999 };
        smoothPos = { x: -999, y: -999 };
        
        window.addEventListener('mousemove', onMouseMove);
        // also handle mouse leaving window to hide mask
        window.addEventListener('mouseleave', () => {
          revealDiv.style.maskImage = 'none';
          revealDiv.style.webkitMaskImage = 'none';
          mouseRaw = { x: -999, y: -999 };
          smoothPos = { x: -999, y: -999 };
        });
        
        // start RAF loop
        rafId = requestAnimationFrame(updateSmoothing);
      }
      
      // if window already loaded, else wait
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
  
  <!-- small script to initialize lucide icons if needed (optional, for future icons) -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof lucide !== 'undefined' && lucide.createIcons) {
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
